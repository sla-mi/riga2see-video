<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>riga.2see — лента</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2see">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --fg:255,255,255; --bg:#0e0e10; --card:#1d1d22; --ink:#e8ff47;
    --btn-bg:rgba(255,255,255,.07); --btn-border:rgba(255,255,255,.16);
    --disp:'Unbounded',sans-serif; --body:'Mulish',sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:rgb(var(--fg));font-family:var(--body);overscroll-behavior:none}
  #feed{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;transition:transform .2s ease,opacity .2s ease}
  #feed::-webkit-scrollbar{display:none}
  .card{position:relative;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;
    display:flex;flex-direction:column;justify-content:flex-end;background:#000}
  .stage{position:absolute;inset:0;overflow:hidden}
  .nocover{position:absolute;inset:0}
  .poster{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);object-fit:cover;transition:opacity .4s}
  /* нет видео — афиша целиком, без обрезки; горизонт-видео — тоже целиком, прижато к верху */
  .card.horiz .poster,.card.photo .poster{object-fit:contain;object-position:50% 30%}
  .card.vert .poster{object-fit:contain}
  .card.horiz .poster.bgp,.card.photo .poster.bgp{object-fit:cover;filter:blur(28px) brightness(.5);transform:scale(1.25);object-position:50% 50%}
  video,iframe.main{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);opacity:0;transition:opacity .4s;border:0}
  .tapcatch{position:absolute;inset:0;background:transparent}
  .card.vert  video.main{object-fit:contain}
  .card.horiz video.main{object-fit:contain;object-position:50% 30%}
  video.bg{object-fit:cover;filter:blur(28px) brightness(.5);transform:scale(1.2)}
  .card.playing video.main,.card.playing video.bg,.card.playing iframe.main{opacity:1}
  .card.playing .poster:not(.bgp){opacity:0}
  /* затемнение только от заголовка и ниже — верх видео остаётся ярким, без лишней дымки */
  .shade{position:absolute;inset:0;pointer-events:none;transition:background .3s;
    background:linear-gradient(to top,rgba(0,0,0,.94) 0%,rgba(0,0,0,.55) 26%,rgba(0,0,0,.12) 38%,transparent 46%)}
  .card.open .shade{background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.9) 67%,rgba(0,0,0,.55) 100%)}

  /* верх: вкладки категорий / шапка избранного — увеличено х2 */
  .top{position:fixed;top:0;left:0;right:0;z-index:9;display:flex;align-items:center;padding:18px 16px 12px;
    background:linear-gradient(to bottom,rgba(0,0,0,.68),transparent)}
  /* лого скроллится единой связкой с категориями (не отдельно) — но центрирование НЕ применяем для «Все» и соседней, чтобы не выталкивало лого */
  .hdr{display:flex;align-items:center;gap:18px;min-width:0;flex:1;overflow-x:auto;scrollbar-width:none;transition:transform .2s ease,opacity .2s ease}
  .hdr::-webkit-scrollbar{display:none}
  .logo{font-family:var(--disp);font-weight:900;font-size:17px;letter-spacing:-.02em;display:inline-flex;align-items:baseline;flex-shrink:0}
  .logo .r,.logo .d{color:#fff}
  .logo .b{color:#15151a;background:var(--ink);padding:2px 7px 3px 4px;border-radius:5px 9px 7px 6px;transform:rotate(-1.6deg);display:inline-block}
  .tabs{display:flex;gap:20px;flex-shrink:0}
  .tab{font-family:var(--disp);font-size:16px;font-weight:700;color:rgba(255,255,255,.5);white-space:nowrap;
    cursor:pointer;padding:2px 0 8px;position:relative;flex-shrink:0}
  .tab.on{color:#fff}
  .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:var(--ink)}
  .favhdr{display:none;align-items:center;gap:8px;padding-right:12px}
  .favttl{flex:1;min-width:0}
  .favhdr.on{display:flex}
  .favcopy{margin-left:auto;font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:.02em;text-transform:uppercase;
    color:#fff;background:rgba(255,255,255,.1);border:1px solid var(--btn-border);border-radius:100px;padding:8px 14px;cursor:pointer;white-space:nowrap}
  .favback{width:34px;height:34px;border:0;background:none;color:#fff;cursor:pointer;display:grid;place-items:center;filter:drop-shadow(0 1px 5px rgba(0,0,0,.6))}
  .favback svg{width:24px;height:24px}
  .favttl{font-family:var(--disp);font-weight:900;font-size:22px;color:#fff}

  .datebar{position:fixed;top:66px;left:20px;z-index:12}
  .datechip{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-size:11px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;color:#fff;background:rgba(14,14,17,.88);
    border:1px solid var(--btn-border);padding:6px 12px;border-radius:100px;cursor:pointer}
  .datechip::after{content:"▾";font-size:9px;opacity:.7}
  .datemenu{position:absolute;top:38px;left:0;width:max-content;min-width:108px;max-height:56dvh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;background:rgba(18,18,22,.96);border:1px solid var(--btn-border);
    border-radius:14px;padding:5px;display:none;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .datemenu.open{display:block}
  .datemenu::-webkit-scrollbar{display:none}
  .dmi{display:block;width:100%;text-align:left;background:none;border:0;cursor:pointer;padding:9px 14px;border-radius:9px;
    color:#fff;font-family:var(--disp);font-size:12px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
  .dmi:active{background:var(--btn-bg)}

  /* низ */
  .info{position:relative;z-index:5;padding:12px 84px calc(20px + env(safe-area-inset-bottom)) 20px;
    display:flex;flex-direction:column;gap:8px}
  .catchip{align-self:flex-start;display:inline-flex;align-items:center;gap:7px;font-family:var(--disp);
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 12px;min-height:28px;margin-left:-12px;
    border-radius:100px;border:1px solid var(--btn-border);background:rgba(14,14,17,.82);color:rgba(255,255,255,.85);cursor:pointer}
  .catchip .dot{width:8px;height:8px;border-radius:50%}
  h1{font-family:var(--disp);font-weight:900;font-size:18px;line-height:1.2;margin:0;letter-spacing:-.01em;
    text-shadow:0 2px 16px rgba(0,0,0,.85);cursor:pointer}
  .dateschip{align-self:flex-start;display:inline-flex;font-family:var(--body);font-weight:700;font-size:13px;
    color:var(--ink);cursor:pointer;padding:5px 12px;border-radius:100px;
    background:rgba(30,30,34,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.14)}
  .datesfull{align-self:flex-start;max-width:100%;max-height:0;overflow:hidden;transition:max-height .3s ease;
    display:inline-flex;flex-wrap:wrap;gap:6px;border-radius:16px}
  .card.datesopen .datesfull{max-height:30dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:6px;
    padding:8px;background:rgba(30,30,34,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  .datesfull .di{font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);
    border-radius:100px;padding:5px 11px;white-space:nowrap}
  /* свёрнутый превью — 3 строки + «ещё…»; видно только пока НЕ open */
  .preview{font-size:15px;line-height:1.5;color:rgba(255,255,255,.92);text-shadow:0 1px 10px rgba(0,0,0,.95);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
  .card.open .preview{display:none}
  .preview .more{color:var(--ink);font-weight:800;white-space:nowrap}
  /* инлайн-описание над заголовком: раскрывается на сколько нужно, скроллится */
  .desc{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .card.open .desc{max-height:46dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .desc::-webkit-scrollbar{display:none}
  .dtext{font-size:15px;line-height:1.55;color:#fff;white-space:pre-line;text-shadow:0 1px 10px rgba(0,0,0,.95);padding:2px 0}
  .dtext .collapse{color:var(--ink);font-weight:800;cursor:pointer;white-space:nowrap}
  .desc .buy{display:inline-block;margin:12px 0 4px;font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.06em;
    text-transform:uppercase;text-decoration:none;padding:12px 22px;border-radius:100px;background:rgba(255,255,255,.12);
    border:1px solid var(--btn-border);color:#fff}
  .meta{font-size:16px;font-weight:800;color:#fff;line-height:1.35;text-shadow:0 1px 10px rgba(0,0,0,.9);font-family:var(--body)}
  .dtext a,.preview a{color:var(--ink);font-weight:700;text-decoration:underline}
  .arow{display:flex;align-items:center;justify-content:flex-start;gap:12px;margin-top:2px}
  .ptag{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.03em;color:var(--ink);
    border:1px solid rgba(232,255,71,.5);background:rgba(232,255,71,.08);padding:7px 13px;border-radius:100px;white-space:nowrap}
  .ptag.free{color:#0b0b0d;background:var(--ink);border-color:var(--ink)}
  .cta-btn{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    text-decoration:none;padding:9px 18px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid var(--btn-border);
    color:#fff;white-space:nowrap}

  .rail{position:fixed;right:8px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:20;display:flex;flex-direction:column;gap:20px;align-items:center}
  .rail button,.rail a{width:46px;height:46px;border:0;background:none;color:#fff;display:grid;place-items:center;cursor:pointer;
    transition:transform .12s;filter:drop-shadow(0 1px 5px rgba(0,0,0,.55));text-decoration:none}
  .rail button:active,.rail a:active{transform:scale(.85)}
  .rail button svg,.rail a svg{width:32px;height:32px;stroke-width:1.8}
  .rail button.on{color:var(--ink)}
  .rail button.on svg{fill:currentColor}
  .rail button.av{position:relative;width:44px;height:44px;border-radius:50%;background:var(--card);border:2px solid #fff;overflow:visible}
  .rail a.ticket{position:relative;color:var(--ink)}
  .ticket-hint{position:absolute;left:50%;top:100%;transform:translateX(-50%);white-space:nowrap;margin-top:2px;
    font-family:var(--disp);font-weight:700;font-size:9px;letter-spacing:.03em;text-transform:uppercase;
    color:rgba(255,255,255,.85);text-shadow:0 1px 4px rgba(0,0,0,.8);
    pointer-events:none;transition:opacity .3s ease}
  .ticket-hint.hide{opacity:0}
  .rail button.av svg{width:24px;height:24px;color:rgba(255,255,255,.85)}
  .favbadge{position:absolute;top:-5px;right:-6px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;
    background:var(--ink);color:#0b0b0d;font-family:var(--disp);font-size:10px;font-weight:800;display:grid;place-items:center;
    border:2px solid #0e0e10}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.55)}100%{transform:scale(1)}}
  .favbadge.bump{animation:pop .35s ease}
  .flybadge{position:fixed;z-index:40;width:26px;height:26px;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
    transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .5s ease}
  .flybadge svg{width:26px;height:26px;fill:var(--ink);stroke:var(--ink)}

  .sound{position:fixed;top:60px;right:16px;z-index:9;width:38px;height:38px;border:0;background:none;color:#fff;
    cursor:pointer;display:grid;place-items:center;filter:drop-shadow(0 1px 6px rgba(0,0,0,.7))}
  .sound svg{width:23px;height:23px}
  .sound.on{color:var(--ink)}

  /* превью следующей/прошлой категории — «призрак», въезжает синхронно со свайпом */
  .ghost{position:fixed;inset:0;z-index:4;display:none;background:#000;overflow:hidden}
  .ghost.on{display:block}
  .ghost img{width:100%;height:100%;object-fit:cover}
  .empty{height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center}
  .empty span{display:inline-block;max-width:230px;font-family:var(--disp);font-weight:700;font-size:16px;
    line-height:1.5;color:rgba(255,255,255,.75)}
  .empty b{color:var(--ink)}
  /* тап по видео скрывает интерфейс */
  .top,.datebar,.sound,.rail,.info{transition:opacity .2s ease}
  body.clean .top,body.clean .datebar,body.clean .sound,body.clean .info{opacity:0;pointer-events:none}
  /* нижний лист напоминаний */
  .sheet{position:fixed;inset:0;z-index:24;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s}
  .sheet.open{opacity:1;pointer-events:auto}
  .sheetcard{position:absolute;left:16px;right:16px;bottom:calc(20px + env(safe-area-inset-bottom));
    background:rgba(20,20,24,.99);border:1px solid var(--btn-border);border-radius:18px;
    padding:14px;transform:translateY(16px);transition:transform .25s;display:flex;flex-direction:column;gap:8px}
  .sheet.open .sheetcard{transform:translateY(0)}
  .sheet-ttl{font-family:var(--disp);font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
    color:rgba(255,255,255,.55);padding:2px 4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ropt{font-family:var(--disp);font-weight:700;font-size:14px;text-align:left;background:var(--btn-bg);
    border:1px solid var(--btn-border);color:#fff;padding:14px 16px;border-radius:12px;cursor:pointer}
  .ropt.on{background:var(--ink);color:#0b0b0d;border-color:var(--ink)}
  .ropt.off{color:#ff8a8a;background:rgba(255,80,80,.08);border-color:rgba(255,80,80,.3)}
  .chan-sub{font-size:13px;color:rgba(255,255,255,.55);padding:0 4px 8px;line-height:1.4}
  .chan-btn{display:flex;align-items:center;gap:12px;font-family:var(--disp);font-weight:700;font-size:14px;
    text-align:left;padding:14px 16px;border-radius:12px;cursor:pointer;border:1px solid var(--btn-border)}
  .chan-btn .ico{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
  .chan-btn .sub{font-family:var(--body);font-weight:400;font-size:12px;color:rgba(255,255,255,.55);margin-top:1px}
  .chan-btn.tg{background:rgba(232,255,71,.1);border-color:rgba(232,255,71,.4)}
  .chan-btn.tg .ico{background:var(--ink);color:#0b0b0d}
  .chan-btn.push,.chan-btn.mail{background:var(--btn-bg);color:#fff}
  .chan-btn.push .ico,.chan-btn.mail .ico{background:rgba(255,255,255,.12);color:#fff}
  .chan-rec{margin-left:auto;font-family:var(--disp);font-size:9px;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;color:#0b0b0d;background:var(--ink);padding:3px 8px;border-radius:100px}
  /* онбординг для новых юзеров — верхняя треть, первое видео уже играет ниже */
  .onboard{position:fixed;left:16px;right:16px;top:112px;z-index:14;background:rgba(16,16,20,.96);
    border:1px solid var(--btn-border);border-radius:16px;padding:16px 18px;opacity:1;transform:translateY(0);
    transition:opacity .3s ease,transform .3s ease}
  .onboard.hide{opacity:0;transform:translateY(-10px);pointer-events:none}
  .ob-ttl{font-family:var(--disp);font-weight:800;font-size:15px;line-height:1.35;color:#fff;margin-bottom:10px}
  .ob-row{font-size:13.5px;color:rgba(255,255,255,.8);line-height:1.6;display:flex;align-items:center;gap:8px}
  .ob-arrow{display:inline-flex;width:22px;height:22px;border-radius:6px;background:rgba(232,255,71,.15);
    color:var(--ink);align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
  .toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(16px);background:rgba(20,20,24,.96);
    border:1px solid rgba(255,255,255,.1);padding:11px 18px;border-radius:14px;font-family:var(--body);font-size:14px;
    font-weight:700;z-index:30;opacity:0;transition:.22s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="top">
  <div class="hdr" id="hdr"><a class="logo"><span class="r">riga</span><span class="d">.</span><span class="b">2see</span></a><div class="tabs" id="tabs"></div></div>
  <div class="favhdr" id="favhdr"><button class="favback" id="favback"></button><span class="favttl">Избранное</span><button class="favcopy" id="favcopy">Копировать</button></div>
</div>
<div class="datebar">
  <button class="datechip" id="datechip"></button>
  <div class="datemenu" id="datemenu"></div>
</div>
<button class="sound" id="sound" title="звук"></button>
<div id="feed"></div>
<div class="rail" id="rail"></div>
<div class="ghost" id="ghost"><img id="ghostimg" alt=""></div>
<div class="onboard" id="onboard">
  <div class="ob-ttl">Все культурные события Риги в одном месте</div>
  <div class="ob-row"><span class="ob-arrow">↓</span> смотреть, сначала ближайшие по дате</div>
  <div class="ob-row"><span class="ob-arrow">→</span> переключить категорию</div>
</div>
<div class="sheet" id="remindsheet"><div class="sheetcard" id="remindcard"></div></div>
<div class="toast" id="toast"></div>

<script>
const CAT_COLOR={ "Концерты":"#e8ff47","Театр":"#ff6b6b","Выставки":"#a78bfa","Стендап":"#ff9e3d",
  "Детям":"#b9f0a0","Кино":"#34d399","Лекции":"#38bdf8","Фестивали":"#fbbf24","Спорт":"#f97316",
  "Классика":"#6d8cff","Клубы":"#d946ef","Еда":"#fb7185","Другое":"#64748b" };
const RU_MONTH=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
const MON_GEN=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const WD_PREP=["в воскресенье","в понедельник","во вторник","в среду","в четверг","в пятницу","в субботу"];
const WD_FULL=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
const ICON={
 bookmark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
 bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
 forward:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 0 1 4-4h12"/></svg>',
 user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',

function fmtDate(s){ if(!s) return ""; const d=new Date(s.replace(" ","T")); if(isNaN(d)) return "";
  const wd=["вс","пн","вт","ср","чт","пт","сб"][d.getDay()];
  return `${wd}, ${d.getDate()} ${RU_MONTH[d.getMonth()]} · ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }
function relDate(s){ if(!s) return ""; const d=new Date(s.replace(" ","T")); if(isNaN(d)) return "";
  const t=new Date(); t.setHours(0,0,0,0); const e=new Date(d); e.setHours(0,0,0,0);
  const diff=Math.round((e-t)/864e5);
  if(diff===0) return "сегодня"; if(diff===1) return "завтра";
  const wd=["вс","пн","вт","ср","чт","пт","сб"][d.getDay()];
  const dm=`${d.getDate()}.${String(d.getMonth()+1).padStart(2,"0")}`;
  return `${wd} · ${dm}`; }
// чип «ближайшая дата +N» для событий с несколькими сеансами; тап — разворачивает полный список инлайн
function datesChipHTML(e){
  if(!e.dates || e.dates.length<2) return "";
  const now=Date.now();
  const future=e.dates.filter(d=>new Date(d.replace(" ","T")).getTime()>=now);
  const near=(future[0]||e.dates[0]);
  return `<span class="dateschip" data-act="dates">${relDate(near)} +${e.dates.length-1}</span>
    <div class="datesfull" data-act="closedates">${e.dates.map(d=>`<span class="di">${fmtDate(d)}</span>`).join("")}</div>`;
}
function firstLine(t){ return (t||"").split(/[\.\n!|]/)[0].trim().slice(0,70); }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function linkify(t){ return esc(t).replace(/(https?:\/\/[^\s<]+)/g,u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`); }
function poster(e){ return e.img || (e.file? e.file.replace("vid/","poster/").replace(".mp4",".jpg") : ""); }
function vidUrl(e){ return e.video ? e.video.url : (e.file || null); }          // стрим-URL или локальный файл
function vidOrient(e){ return e.video ? e.video.orient : (e.orient || "vert"); }
function hasVideo(e){ return !!vidUrl(e); }

// варианты напоминания в зависимости от близости события (как в афише)
function reminderOpts(s){
  const d=new Date((s||"").replace(" ","T")); const t=new Date(); t.setHours(0,0,0,0);
  const e=new Date(d); e.setHours(0,0,0,0); const diff=Math.round((e-t)/864e5);
  if(isNaN(diff)) return ["За день","За 2 часа"];
  if(diff<=0) return ["За 2 часа","За 1 час"];
  if(diff===1) return ["Сегодня вечером","Завтра утром","За 2 часа"];
  if(diff<=7) return ["За день","Утром в день события","За 2 часа"];
  return ["За неделю","За 3 дня","За день","За 2 часа"];
}
function openRemindMenu(e, btnEl){
  const card=document.getElementById("remindcard"); const cur=remind.get(e.id);
  let html=`<div class="sheet-ttl">Напомнить · ${e.ev_title||e.page}</div>`;
  if(cur!==undefined) html+=`<button class="ropt off" data-v="__off">✕ Убрать напоминание</button>`;
  reminderOpts(e.date).forEach(o=>html+=`<button class="ropt ${cur===o?'on':''}" data-v="${o}">${o}</button>`);
  card.innerHTML=html;
  card.querySelectorAll(".ropt").forEach(b=>b.onclick=()=>{
    if(b.dataset.v==="__off"){ remind.delete(e.id); if(btnEl) btnEl.classList.remove("on"); toast("Напоминание убрано");
      document.getElementById("remindsheet").classList.remove("open"); return; }
    remind.set(e.id,b.dataset.v); if(btnEl) btnEl.classList.add("on");
    if(!notifyChannel){                                    // канал ещё не выбран — спрашиваем один раз
      openChannelSheet(`«${e.ev_title||e.page}» — ${b.dataset.v.toLowerCase()}`);
    } else {
      toast("🔔 Напомним · "+b.dataset.v.toLowerCase()+(notifyChannel==="tg"?" · Telegram":" · Push"));

    }
  });
  document.getElementById("remindsheet").classList.add("open");
}

// канал доставки напоминаний — спрашиваем один раз, при первом включённом напоминании.
// Push без проверки не заслуживает доверия (разрешение ≠ доставка, особенно на iPhone) —
// поэтому сразу после Notification.requestPermission шлём тестовое уведомление и ждём подтверждения.
let notifyChannel=null; // null | "tg" | "push" | "email"
function openChannelSheet(afterText){
  const card=document.getElementById("remindcard");
  card.innerHTML=`
    <div class="sheet-ttl">Куда прислать напоминание?</div>
    <div class="chan-sub">${afterText}</div>
    <button class="chan-btn tg" data-c="tg"><span class="ico">${ICON.tg}</span><span><div>Telegram</div><div class="sub">1 тап — бот сам напишет вовремя</div></span><span class="chan-rec">лучше</span></button>
    <button class="chan-btn push" data-c="push"><span class="ico">${ICON.push}</span><span><div>Push-уведомления</div><div class="sub">на iPhone нужно добавить сайт «на экран Домой»</div></span></button>
    <button class="chan-btn mail" data-c="email"><span class="ico">${ICON.mail}</span><span><div>Email</div><div class="sub">надёжно, но не для «за 2 часа» — люди не читают почту в моменте</div></span></button>`;
  card.querySelectorAll(".chan-btn").forEach(b=>b.onclick=()=>{
    const c=b.dataset.c;
    document.getElementById("remindsheet").classList.remove("open");
    if(c==="push"){ setupPush(); }
    else if(c==="email"){ notifyChannel="email"; toast("Укажи email в профиле — пришлём туда"); }
    else { notifyChannel="tg"; toast("Готово — бот пришлёт напоминание в Telegram"); }
  });
  document.getElementById("remindsheet").classList.add("open");
}
// пуш подтверждаем тестовым уведомлением — без этого доверять «разрешено» нельзя
function setupPush(){
  if(!("Notification" in window)){ toast("Push не поддерживаются — переключим на Telegram"); openChannelSheet("Push недоступны в этом браузере"); return; }
  Notification.requestPermission().then(p=>{
    if(p!=="granted"){ toast("Push не разрешены — выбери Telegram"); openChannelSheet("Push отклонены браузером"); return; }
    try{
      const n=new Notification("2see — проверка", { body:"Если видишь это — push настроены ✓" });
      notifyChannel="push";
      toast("Проверь, пришло ли уведомление — если нет, переключись на Telegram");
      setTimeout(()=>n.close(),6000);
    }catch(e){ toast("Push разрешены, но не показались — надёжнее Telegram"); }
  });
}
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show");

function cardHTML(e,i){
  // без видео — показываем афишу целиком (contain), никогда не обрезаем; с видео — по его ориентации
  // квадратные видео тоже не заполняют портретный экран целиком — та же обработка (contain + верхняя треть), что у горизонтальных
  const orient=!hasVideo(e) ? "photo" : ((vidOrient(e)==="horiz"||vidOrient(e)==="sq")?"horiz":"vert");
  const cat=e.cat||""; const col=CAT_COLOR[cat]||"#cfcfd6";
  const priceTxt = e.is_free ? "Бесплатно" : (e.price_from!=null ? `от ${Math.round(e.price_from)} €` : "");
  const title = e.ev_title || firstLine(e.title) || e.page;
  const place = e.venue || e.page;
  const bodyText = (e.body||"Описание появится позже.").trim();
  const chip = ((favMode||curCat===null) && cat) ? `<span class="catchip" data-act="setcat" data-cat="${cat}"><span class="dot" style="background:${col}"></span>${cat}</span>` : "";
  const purl=poster(e);
  const bgPoster = purl && (orient==="horiz"||orient==="photo") ? `<img class="poster bgp" src="${purl}" alt="" loading="lazy" onerror="this.remove()">` : "";
  // нет вообще никакой картинки (редко, ~0.6%) — заливка цветом категории вместо сломанного img
  // если картинка не грузится (сломанная ссылка у источника) — цветная заглушка вместо «битой иконки»
  const onerr=`this.replaceWith(Object.assign(document.createElement('div'),{className:'nocover',style:'background:${col}55'}))`;
  const stageInner = purl ? `${bgPoster}<img class="poster" src="${purl}" alt="" loading="lazy" onerror="${onerr}">`
                           : `<div class="nocover" style="background:${col}55"></div>`;
  return `<div class="card ${orient}" data-i="${i}">
    <div class="stage">${stageInner}</div>
    <div class="shade"></div>
    <div class="info">
      ${chip}
      <h1 data-act="open">${title}</h1>
      ${place?`<div class="meta">${place}</div>`:""}
      ${datesChipHTML(e)}
      <div class="preview" data-act="open">${linkify(bodyText)}<span class="more">  ещё…</span></div>
      <div class="desc"><div class="dtext">${linkify(bodyText)}<span class="collapse" data-act="close">  свернуть</span></div></div>
      <div class="arow">
        ${priceTxt?`<span class="ptag ${e.is_free?"free":""}">${priceTxt}</span>`:""}
      </div>
    </div>
  </div>`;
}

// видео: монтируем только активной ±1
function ytEmbedSrc(url){ const id=(url.match(/embed\/([A-Za-z0-9_-]{6,})/)||[])[1];
  return id ? `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0&modestbranding=1&rel=0&playsinline=1` : url; }
function mountVideo(card){
  if(card.querySelector(".main")) return card.querySelector(".main");
  const e=VIEW[+card.dataset.i]; const url=vidUrl(e); if(!url) return null;   // статичная карточка (только постер)
  const stage=card.querySelector(".stage");
  if(e.video && e.video.type==="embed"){                  // эмбед из билетки (YouTube) — не mp4, отдельный путь
    const f=document.createElement("iframe"); f.className="main embed"; f.src=ytEmbedSrc(url);
    f.setAttribute("allow","autoplay; encrypted-media"); f.setAttribute("frameborder","0");
    f.style.pointerEvents="none";                          // без этого тап по видео уходит внутрь iframe и не доходит до нашего кода
    stage.appendChild(f);
    const tapcatch=document.createElement("div"); tapcatch.className="tapcatch"; stage.appendChild(tapcatch);
    f.dataset.embed="1"; return f;
  }
  const pu=poster(e);
  const prep=(vd,cls)=>{ vd.className=cls;vd.src=url;vd.loop=true;vd.playsInline=true;vd.muted=true;vd.defaultMuted=true;
    if(cls==="main"&&pu) vd.poster=pu;                    // постер на паузе/буферизации вместо чёрного
    vd.setAttribute("muted","");vd.setAttribute("playsinline","");vd.setAttribute("webkit-playsinline","");vd.setAttribute("autoplay","");vd.preload="auto"; };
  { const bg=document.createElement("video");prep(bg,"bg");stage.appendChild(bg); }
  const v=document.createElement("video");prep(v,"main");stage.appendChild(v); return v;
}
function unmountVideo(card){ card.classList.remove("playing");
  card.querySelectorAll("video, iframe.main").forEach(v=>{ if(v.tagName==="VIDEO"){v.pause();v.removeAttribute("src");v.load();} v.remove(); }); }
function setActive(i){
  if(i===ACTIVE) return;
  if(i>0) hideOnboard();
  const prev=document.querySelector(`.card[data-i="${ACTIVE}"]`); if(prev){ prev.classList.remove("open"); }
  document.body.classList.remove("clean");   // новое видео — всегда с исходного состояния (заголовки видны)
  ACTIVE=i;
  const cards=[...document.querySelectorAll(".card")];
  cards.forEach(c=>{
    const idx=+c.dataset.i, near=Math.abs(idx-i)<=1;
    if(!near){ unmountVideo(c); return; }
    const v=mountVideo(c);
    if(!v){ c.classList.remove("playing"); return; }        // статичная карточка — только постер
    if(v.tagName==="IFRAME"){ if(idx===i) c.classList.add("playing"); else c.classList.remove("playing"); return; }
    if(idx===i){ v.muted=!SOUND; const bg=c.querySelector("video.bg");
      const go=()=>{ v.currentTime=0; v.play().catch(()=>{}); if(bg){bg.currentTime=0;bg.muted=true;bg.play().catch(()=>{});} };
      if(v.readyState>=2) go(); else v.addEventListener("loadeddata",go,{once:true});
      v.addEventListener("playing",()=>c.classList.add("playing"),{once:true});
    } else { c.classList.remove("playing"); v.pause(); const bg=c.querySelector("video.bg"); if(bg) bg.pause(); }
  });
  const e=VIEW[i]; if(e){ document.getElementById("datechip").textContent=relDate(e.date); renderRail(e); }
}

// жесты: открыто → свайп вниз закрывает; закрыто → гориз = смена категории
function bindGestures(card){
  let x0=0,y0=0,dx=0,dy=0,horiz=null,drag=false,tgt=null;
  const desc=card.querySelector(".desc");
  const stage=card.querySelector(".stage"), info=card.querySelector(".info"), shade=card.querySelector(".shade");   // свайпается только контент ивента (картинка/видео+фон+текст), НЕ борт/шапка/дата
  const ghost=document.getElementById("ghost"), ghostimg=document.getElementById("ghostimg");
  let ghostDir=0;   // 1 = следующая категория (свайп влево), -1 = предыдущая (свайп вправо)
  const start=(x,y,t)=>{ x0=x;y0=y;dx=dy=0;horiz=null;drag=true;tgt=t;ghostDir=0;};
  const move=(x,y)=>{ if(!drag)return; dx=x-x0;dy=y-y0;
    if(horiz===null && (Math.abs(dx)>10||Math.abs(dy)>10)) horiz=Math.abs(dx)>Math.abs(dy);
    if(!card.classList.contains("open") && horiz && !favMode){
      // нативный свайп — вся карточка едет 1:1 с пальцем; навстречу въезжает превью соседней категории
      // шапка с категориями пальцем НЕ тащится — двигается только после отпускания, синхронно с посадкой карточки
      const fade=Math.max(0, 1-Math.abs(dx)/280);
      stage.style.transform=`translateX(${dx}px)`; info.style.transform=`translateX(${dx}px)`; shade.style.transform=`translateX(${dx}px)`;
      stage.style.opacity=fade; info.style.opacity=fade;
      const dir=dx<0?1:-1;
      if(ghostDir!==dir){ ghostDir=dir;
        let i=TABS.indexOf(curCat||"")+dir; if(i<0)i=TABS.length-1; if(i>=TABS.length)i=0;
        const item=firstItemFor(TABS[i]===""?null:TABS[i]);
        ghostimg.src=item?poster(item):""; ghost.classList.add("on"); ghost.style.transition="none"; }
      const W=window.innerWidth;
      ghost.style.transform=`translateX(${(dir>0?W:-W)+dx}px)`; } };
  const end=()=>{ if(!drag)return; drag=false;
    [stage,info,shade].forEach(el=>el.style.transition="transform .2s ease, opacity .2s ease");
    stage.style.transform=""; info.style.transform=""; shade.style.transform=""; stage.style.opacity=""; info.style.opacity="";
    setTimeout(()=>{ [stage,info,shade].forEach(el=>el.style.transition=""); },220);
    if(ghostDir){ const commit = horiz && Math.abs(dx)>70 && !favMode;
      ghost.style.transition="transform .2s ease";
      ghost.style.transform=`translateX(${commit?0:(ghostDir>0?window.innerWidth:-window.innerWidth)}px)`;
      setTimeout(()=>{ ghost.classList.remove("on"); ghost.style.transition=""; ghost.style.transform=""; }, commit?60:210); }
    if(card.classList.contains("open")){
      // описание развёрнуто — тап по картинке/видео (не по заголовку/тексту) сворачивает его обратно
      if(Math.abs(dx)<8 && Math.abs(dy)<8 && tgt && tgt.closest(".stage")){ card.classList.remove("open"); }
      return;
    }
    // свёрнуто — тап по видео скрывает/показывает заголовки и кнопки (чтобы прочитать надписи на самом видео)
    if(Math.abs(dx)<8 && Math.abs(dy)<8 && tgt && tgt.closest(".stage")){ document.body.classList.toggle("clean"); return; }
    if(horiz && Math.abs(dx)>70 && !favMode){ switchCategory(dx<0?1:-1); } };
  card.addEventListener("touchstart",e=>start(e.touches[0].clientX,e.touches[0].clientY,e.target),{passive:true});
  card.addEventListener("touchmove",e=>{ move(e.touches[0].clientX,e.touches[0].clientY);
    if(horiz && !card.classList.contains("open")) e.preventDefault(); },{passive:false});
  card.addEventListener("touchend",end);
  card.addEventListener("mousedown",e=>start(e.clientX,e.clientY,e.target));
  window.addEventListener("mousemove",e=>drag&&move(e.clientX,e.clientY));
  window.addEventListener("mouseup",end);
}

function flyToAvatar(fromEl){
  const av=document.querySelector("#rail .av");
  if(!av){ updateFavBadges(true); return; }
  const a=fromEl.getBoundingClientRect(), b=av.getBoundingClientRect();
  const fly=document.createElement("div"); fly.className="flybadge"; fly.innerHTML=ICON.bookmark;
  fly.style.left=(a.left+a.width/2-13)+"px"; fly.style.top=(a.top+a.height/2-13)+"px";
  document.body.appendChild(fly);
  const dx=(b.left+b.width/2)-(a.left+a.width/2), dy=(b.top+b.height/2)-(a.top+a.height/2);
  requestAnimationFrame(()=>{ fly.style.transform=`translate(${dx}px,${dy}px) scale(.35)`; fly.style.opacity="0"; });
  setTimeout(()=>{ fly.remove(); updateFavBadges(true); }, 500);
}
function bindActions(card){
  card.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click",ev=>{ ev.stopPropagation(); if(el.tagName==="A"&&el.dataset.act) ev.preventDefault();
      const act=el.dataset.act, e=VIEW[+card.dataset.i];
      if(act==="open"){ card.classList.add("open"); }
      else if(act==="close"){ card.classList.remove("open"); }
      else if(act==="setcat"){ if(!favMode) setCategory(el.dataset.cat,1); }
      else if(act==="dates"){ card.classList.toggle("datesopen"); }
      else if(act==="closedates"){ card.classList.remove("datesopen"); }
    });
  });
}

// категории / избранное
function currentList(){
  const base = favMode ? ALL.filter(e=>fav.has(e.id))
                       : ALL.filter(e=>curCat===null || (e.cat||"")===curCat);
  const byDate=(a,b)=>String(a.date||"9999").localeCompare(String(b.date||"9999"));
  // приоритет видео: сначала все события с видео (по дате), затем все без видео (по дате)
  const withVideo = base.filter(hasVideo).sort(byDate);
  const withoutVideo = base.filter(e=>!hasVideo(e)).sort(byDate);
  return [...withVideo, ...withoutVideo];
}
// первое событие произвольной категории (для превью-«призрака» во время свайпа)
function firstItemFor(catKey){
  const list = ALL.filter(e=>catKey===null || (e.cat||"")===catKey)
                  .slice().sort((a,b)=>String(a.date||"9999").localeCompare(String(b.date||"9999")));
  return list[0]||null;
}
function buildTabs(){
  const counts={}; ALL.forEach(e=>{ const c=e.cat||""; if(c) counts[c]=(counts[c]||0)+1; });
  const present=Object.keys(CAT_COLOR).filter(c=>counts[c]);
  TABS=["", ...present];
  const el=document.getElementById("tabs");
  el.innerHTML=TABS.map(c=>`<span class="tab ${((curCat||"")===c)?'on':''}" data-cat="${c}">${c||"Все"}</span>`).join("");
  el.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>setCategory(t.dataset.cat,0)));
}
// шапка переезжает к новой вкладке ровно за то же время, что карточка садится на место (220мс), а не отдельным нативным скроллом
function animateScrollTo(el,target,ms){
  const from=el.scrollLeft, delta=target-from, t0=performance.now();
  if(Math.abs(delta)<1) return;
  function step(now){ const p=Math.min(1,(now-t0)/ms); const e=1-Math.pow(1-p,3);
    el.scrollLeft=from+delta*e; if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}
function updateTabs(){
  const hdr=document.getElementById("hdr");
  const tabs=[...document.querySelectorAll("#tabs .tab")];
  tabs.forEach((t,idx)=>{
    const on=(curCat||"")===t.dataset.cat; t.classList.toggle("on",on);
    if(!on) return;
    // «Все» и соседняя с ней категория — лого рядом; НЕ центрируем (выталкивало бы лого за край),
    // а явно возвращаем скролл к 0 — иначе после возврата с дальней категории лого останется скрытым
    const target = idx<=1 ? 0 : t.offsetLeft-(hdr.clientWidth-t.offsetWidth)/2;
    animateScrollTo(hdr, Math.max(0,target), 220);
  });
}
function setCategory(cat, dir){
  const next = cat===""?null:cat; if(next===curCat && !favMode){ return; }
  const curEv=VIEW[ACTIVE]; if(curEv && curEv.date) lastActiveDate=curEv.date;   // запоминаем дату, на которой были, чтобы новая категория открылась рядом с ней, а не с начала
  favMode=false; curCat=next;
  document.getElementById("favhdr").classList.remove("on"); document.getElementById("hdr").style.display="";
  const feed=document.getElementById("feed");
  feed.style.transform=`translateX(${dir>0?-36:(dir<0?36:0)}px)`; feed.style.opacity="0";
  setTimeout(()=>{ buildFeed(currentList());
    feed.style.transition="none"; feed.style.transform=`translateX(${dir>0?36:(dir<0?-36:0)}px)`;
    requestAnimationFrame(()=>{ feed.style.transition=""; feed.style.transform="translateX(0)"; feed.style.opacity="1"; });
    updateTabs();
  },180);
}
function switchCategory(dir){ if(favMode) return;
  let i=TABS.indexOf(curCat||"")+dir;
  if(i<0 || i>=TABS.length) return;   // границы — тупик, без перескока на другой конец
  setCategory(TABS[i], dir); toast("Категория: "+(TABS[i]||"Все")); }

function enterFav(){
  favMode=true;
  document.getElementById("hdr").style.display="none";
  document.getElementById("favhdr").classList.add("on");
  buildFeed(currentList());
  if(!VIEW.length){} else toast("Избранное — «хочу пойти»");
}
function exitFav(){
  favMode=false;
  document.getElementById("favhdr").classList.remove("on");
  document.getElementById("hdr").style.display="";
  buildFeed(currentList()); updateTabs();
}
document.getElementById("favback").innerHTML=ICON.back;
document.getElementById("favback").addEventListener("click",exitFav);
document.getElementById("favcopy").addEventListener("click",()=>{
  const list=ALL.filter(e=>fav.has(e.id));
  const text=list.map(e=>`${e.ev_title||e.title||e.page} — ${e.venue||e.page||""} (id ${e.id})`).join("\n");
  navigator.clipboard?.writeText(text||"(избранное пусто)");
  toast(text?"Список скопирован — вставь в чат":"Избранное пусто");
});

// ── виртуализация: рендерим окно карточек, а не всю ленту разом (862 карточки разом валят iPhone) ──
let _io=null; const PAGE=10; let rendered=0;
function bindCard(c){ bindGestures(c); bindActions(c); if(_io) _io.observe(c); }
function appendBatch(){
  const feed=document.getElementById("feed");
  const slice=VIEW.slice(rendered, rendered+PAGE);
  if(!slice.length) return;
  const div=document.createElement("div");
  div.innerHTML=slice.map((e,k)=>cardHTML(e, rendered+k)).join("");
  [...div.children].forEach(c=>{ feed.appendChild(c); bindCard(c); });
  rendered+=slice.length;
}
function ensureRendered(idx){ while(rendered<=idx && rendered<VIEW.length) appendBatch(); }
function buildFeed(list){
  VIEW=list; ACTIVE=-1; rendered=0;
  const feed=document.getElementById("feed");
  feed.innerHTML="";
  if(_io) _io.disconnect();
  _io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting&&en.intersectionRatio>0.6) setActive(+en.target.dataset.i); }); },{threshold:[0,.6,1]});
  if(!VIEW.length){
    feed.innerHTML=`<div class="empty"><span>Пока пусто — жми <b>закладку</b> на видео, чтобы добавить сюда</span></div>`;
  } else {
    appendBatch();                                   // первые 10 карточек — дальше догружаем по скроллу
  }
  const cards=[...feed.querySelectorAll(".card")];
  document.querySelector(".datebar").style.display = cards.length ? "" : "none";
  if(cards.length){
    let startIdx=0;
    if(lastActiveDate){                                    // ищем в новой категории событие с ближайшей датой к той, на которой были
      const target=new Date(lastActiveDate.replace(" ","T")).getTime();
      let best=Infinity;
      VIEW.forEach((e,idx)=>{ if(!e.date) return; const d=new Date(e.date.replace(" ","T")).getTime();
        const diff=Math.abs(d-target); if(diff<best){ best=diff; startIdx=idx; } });
    }
    ensureRendered(startIdx);
    const target=feed.querySelector(`.card[data-i="${startIdx}"]`);
    if(target) target.scrollIntoView();
    setActive(startIdx);
  }
  buildDateMenu(); updateFavBadges();
}

// выпадающий список дат
function buildDateMenu(){
  const menu=document.getElementById("datemenu");
  const seen=new Map();
  VIEW.forEach((e,i)=>{ if(!e.date) return; const k=e.date.slice(0,10); if(!seen.has(k)) seen.set(k,i); });
  const t=new Date(); t.setHours(0,0,0,0);
  menu.innerHTML=[...seen.entries()].map(([k,idx])=>{
    const d=new Date(k+"T00:00:00"); const diff=Math.round((d-t)/864e5);
    const word = diff===0?"сегодня":diff===1?"завтра":["вс","пн","вт","ср","чт","пт","сб"][d.getDay()];
    const dm=`${d.getDate()}.${String(d.getMonth()+1).padStart(2,"0")}`;
    return `<button class="dmi" data-idx="${idx}">${word} · ${dm}</button>`;
  }).join("");
  menu.querySelectorAll(".dmi").forEach(b=>b.addEventListener("click",()=>{
    menu.classList.remove("open");
    const idx=+b.dataset.idx;
    ensureRendered(idx);                              // догрузить карточки вплоть до выбранной даты
    const card=document.querySelector(`.card[data-i="${idx}"]`);
    if(card){ document.getElementById("feed").scrollTo({top:card.offsetTop}); setActive(idx); }
  }));
}
(function(){
  const chip=document.getElementById("datechip"), menu=document.getElementById("datemenu");
  chip.addEventListener("click",e=>{ e.stopPropagation(); menu.classList.toggle("open"); });
  document.addEventListener("click",e=>{ if(!e.target.closest(".datebar")) menu.classList.remove("open"); });
})();

// догрузка следующих карточек, когда пользователь приближается к концу отрендеренного окна
document.getElementById("feed").addEventListener("scroll",()=>{
  const feed=document.getElementById("feed");
  if(rendered<VIEW.length && feed.scrollTop+feed.clientHeight*2 > feed.scrollHeight) appendBatch();
},{passive:true});

// авто-переход на следующую категорию в конце (не в избранном)
(function(){
  const feed=document.getElementById("feed");
  let sy=0, over=0, atEnd=false;
  feed.addEventListener("touchstart",e=>{ sy=e.touches[0].clientY; over=0;
    atEnd = feed.scrollTop+feed.clientHeight >= feed.scrollHeight-2; },{passive:true});
  feed.addEventListener("touchmove",e=>{ if(atEnd){ const d=sy-e.touches[0].clientY; if(d>0) over=d; } },{passive:true});
  feed.addEventListener("touchend",()=>{ if(atEnd && over>55 && curCat!==null && !favMode){ switchCategory(1); } over=0; });
})();

// онбординг — показываем один раз за сессию, без кнопки; исчезает по первому свайпу/скроллу ленты или смене карточки
function hideOnboard(){
  const ob=document.getElementById("onboard"); if(!ob) return;
  ob.classList.add("hide"); sessionStorage.setItem("onboarded","1"); setTimeout(()=>ob.remove(),350);
}
(function(){
  const ob=document.getElementById("onboard");
  if(sessionStorage.getItem("onboarded")){ ob.remove(); return; }
  const feed=document.getElementById("feed"); let y0=0;
  feed.addEventListener("touchstart",e=>{ y0=e.touches[0].clientY; },{passive:true});
  feed.addEventListener("touchmove",e=>{ if(y0-e.touches[0].clientY>30) hideOnboard(); },{passive:true});
  feed.addEventListener("scroll",()=>{ if(feed.scrollTop>20) hideOnboard(); },{passive:true});
})();

// подпись «Билеты» под иконкой билета — видна только до первого нажатия на сам значок
(function(){
  const hint=document.getElementById("ticketHint");
  if(localStorage.getItem("ticketHintSeen")){ hint.remove(); return; }
  const dismiss=()=>{ hint.classList.add("hide"); localStorage.setItem("ticketHintSeen","1"); setTimeout(()=>hint.remove(),350); };
  railEl.querySelector('[data-act="ticket"]').addEventListener("click",dismiss,{once:true});
})();

// демо-датасет собран один раз и не обновляется живым пайплайном — даты в нём стареют.
// вместо ручной правки дат при каждом показе сдвигаем их на лету: якорь = самая ранняя дата в файле,
// разница между якорем и реальным "сегодня" применяется ко всем датам при каждой загрузке страницы.
function shiftDatesToToday(list){
  let anchor=null;
  for(const e of list){ if(!e.date) continue; const d=new Date(e.date.replace(" ","T"));
    if(!isNaN(d) && (anchor===null || d<anchor)) anchor=d; }
  if(!anchor) return;
  anchor.setHours(0,0,0,0);
  const today=new Date(); today.setHours(0,0,0,0);
  const diffDays=Math.round((today-anchor)/864e5);
  if(!diffDays) return;
  const pad=n=>String(n).padStart(2,"0");
  const shift=s=>{ const d=new Date(s.replace(" ","T")); if(isNaN(d)) return s; d.setDate(d.getDate()+diffDays);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; };
  for(const e of list){
    if(e.date) e.date=shift(e.date);
    if(e.dates) e.dates=e.dates.map(shift);
  }
}
async function boot(){
  ALL=await (await fetch("big_feed.json",{cache:"no-store"})).json();
  shiftDatesToToday(ALL);
  buildTabs();
  buildFeed(currentList());
  let unlocked=false;
  const unlock=()=>{ if(unlocked)return; unlocked=true;
    const v=document.querySelector(`.card[data-i="${ACTIVE}"] video.main`); if(v){ v.muted=!SOUND; v.play().catch(()=>{}); } };
  ["touchstart","click","scroll"].forEach(ev=>window.addEventListener(ev,unlock,{once:true,passive:true}));
}
boot();
