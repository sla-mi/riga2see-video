": 640}]}, {"ru": "пиротехника и конфетти над сценой стадионного концерта", "q": "pyrotechnics confetti concert stage", "candidates": [{"pexels_id": 34636825, "url": "https://videos.pexels.com/video-files/34636825/14680498_360_640_30fps.mp4", "duration": 8, "preview": "https://images.pexels.com/videos/34636825/concert-scene-live-concert-34636825.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1200&w=630", "w": 360, "h": 640}, {"pexels_id": 30167997, "url": "https://videos.pexels.com/video-files/30167997/12936551_360_640_30fps.mp4", "duration": 53, "preview": "https://images.pexels.com/videos/30167997/pexels-photo-30167997.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1200&w=630", "w": 360, "h": 640}, {"pexels_id": 32175647, "url": "https://videos.pexels.com/video-files/32175647/13721061_360_640_60fps.mp4", "duration": 22, "preview": "https://images.pexels.com/videos/32175647/fireworks-32175647.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1200&w=630", "w": 360, "h": 640}, {"pexels_id": 35323903, "url": "https://videos.pexels.com/video-files/35323903/14966319_360_640_30fps.mp4", "duration": 21, "preview": "https://images.pexels.com/videos/35323903/annual-celebration-annual-event-art-event-asia-35323903.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1200&w=630", "w": 360, "h": 640}, {"pexels_id": 37622460, "url": "https://videos.pexels.com/video-files/37622460/15946863_360_640_60fps.mp4", "duration": 15, "preview": "https://images.pexels.com/videos/37622460/pexels-photo-37622460.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1200&w=630", "w": 360, "h": 640}, {"pexels_id": 35323943, "url": "https://videos.pexels.com/video-files/35323943/14966240_360_640_30fps.mp4", "duration": 17, "preview": "https://images.pexels.com/videos/35323943/annual-celebration-annual-event-art-event-asia-35323943.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=1200&w=630", "w": 360, "h": 640}]}, {"ru": "большой led-экран сцены, сценический свет", "q": "led screen concert stage lights", "candidates": [{"pexels_id": 8039798, <script>
const EVENTS = JSON.parse(document.getElementById('data').textContent);
let ei=0, ti=0, ci=0, playing=true, SOUND=false;
const vid=document.getElementById('vid');
const RATE_KEY='videopicker_ratings_v1';
let ratings = JSON.parse(localStorage.getItem(RATE_KEY) || '{}');

function saveRatings(){ localStorage.setItem(RATE_KEY, JSON.stringify(ratings)); }
function rkey(){ const t=curTag(); const c=curCand(); return EVENTS[ei].id+'|'+t.q+'|'+(c?c.pexels_id:'none'); }
function curTag(){ return EVENTS[ei].tags[ti]; }
function curCand(){ const t=curTag(); return (t.candidates||[])[ci]; }

function renderProgress(){
  const el=document.getElementById('progress'); el.innerHTML='';
  EVENTS[ei].tags.forEach((t,idx)=>{
    const i=document.createElement('i');
    if(idx<ti) i.className='done'; else if(idx===ti) i.className='cur';
    el.appendChild(i);
  });
}

function render(){
  const ev=EVENTS[ei]; const tag=curTag(); const cand=curCand();
  document.getElementById('evtitle').textContent = ev.title;
  document.getElementById('evmeta').textContent = ev.venue + ' · ' + ev.category;
  document.getElementById('tagpill').innerHTML = tag.ru + '<span class="tagn">'+(ti+1)+'/'+ev.tags.length+'</span>';
  const cands = tag.candidates || [];
  document.getElementById('candn').textContent = cands.length ? (ci+1)+'/'+cands.length : 'нет вариантов';
  renderProgress();
  if(cand){
    vid.src = cand.url; vid.muted=!SOUND; vid.play().catch(()=>{}); playing=true;
    document.getElementById('playBtn').innerHTML='&#10074;&#10074;';
  } else {
    vid.removeAttribute('src'); vid.load();
  }
  const r = ratings[rkey()];
  document.getElementById('likeBtn').classList.toggle('on', r && r.like===true);
  document.getElementById('dislikeBtn').classList.toggle('on', r && r.like===false);
  document.getElementById('commentText').value = (r && r.comment) || '';
}

function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1100); }

document.querySelectorAll('.tbtn').forEach(b=>{
  b.addEventListener('click', ()=>{
    const act=b.dataset.act; const ev=EVENTS[ei];
    if(act==='prevtag'){ if(ti>0){ ti--; ci=0; render(); } }
    else if(act==='nexttag'){ if(ti<ev.tags.length-1){ ti++; ci=0; render(); } else toast('это последний тег'); }
    else if(act==='prevcand'){ const n=(ev.tags[ti].candidates||[]).length; if(n){ ci=(ci-1+n)%n; render(); } }
    else if(act==='nextcand'){ const n=(ev.tags[ti].candidates||[]).length; if(n){ ci=(ci+1)%n; render(); } }
    else if(act==='play'){ if(vid.paused){ vid.play(); playing=true; document.getElementById('playBtn').innerHTML='&#10074;&#10074;'; document.getElementById('commentBox').classList.remove('show'); }
      else { vid.pause(); playing=false; document.getElementById('playBtn').innerHTML='&#9654;'; document.getElementById('commentBox').classList.add('show'); } }
  });
});

function setLike(v){
  const k=rkey(); const prev=ratings[k]||{};
  ratings[k] = Object.assign({}, prev, {like:v, eventId:EVENTS[ei].id, eventTitle:EVENTS[ei].title,
    tag:curTag().ru, query:curTag().q, candidate:curCand()});
  saveRatings();
  document.getElementById('likeBtn').classList.toggle('on', v===true);
  document.getElementById('dislikeBtn').classList.toggle('on', v===false);
  toast(v?'Нравится':'Не нравится');
}
document.getElementById('likeBtn').addEventListener('click', ()=>setLike(true));
document.getElementById('dislikeBtn').addEventListener('click', ()=>setLike(false));
document.getElementById('commentText').addEventListener('input', e=>{
  const k=rkey(); const prev=ratings[k]||{eventId:EVENTS[ei].id, eventTitle:EVENTS[ei].title, tag:curTag().ru, query:curTag().q, candidate:curCand()};
  ratings[k]=Object.assign({}, prev, {comment:e.target.value});
  saveRatings();
});

document.getElementById('soundBtn').addEventListener('click', ()=>{
  SOUND=!SOUND; vid.muted=!SOUND; document.getElementById('soundBtn').innerHTML = SOUND ? '&#128266;' : '&#128264;';
});

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const arr = Object.values(ratings);
  const blob = new Blob([JSON.stringify(arr, null, 2)], {type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='video_ratings.json';
  document.body.appendChild(a); a.click(); a.remove();
});

// свайп вверх/вниз — смена события
let sy=null;
document.getElementById('app').addEventListener('touchstart', e=>{ sy=e.touches[0].clientY; }, {passive:true});
document.getElementById('app').addEventListener('touchend', e=>{
  if(sy===null) return;
  const dy = e.changedTouches[0].clientY - sy; sy=null;
  if(Math.abs(dy)<40) return;
  if(dy<0 && ei<EVENTS.length-1){ ei++; ti=0; ci=0; render(); toast('Событие '+(ei+1)+'/'+EVENTS.length); }
  else if(dy>0 && ei>0){ ei--; ti=0; ci=0; render(); toast('Событие '+(ei+1)+'/'+EVENTS.length); }
});
// колесо мыши для десктоп-теста
document.getElementById('app').addEventListener('wheel', e=>{
  if(Math.abs(e.deltaY)<30) return;
  if(e.deltaY>0 && ei<EVENTS.length-1){ ei++; ti=0; ci=0; render(); }
  else if(e.deltaY<0 && ei>0){ ei--; ti=0; ci=0; render(); }
});

render();
</script>
