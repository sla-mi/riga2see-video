<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>riga.2see — лента</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230e0e10'/%3E%3Crect x='6' y='11' width='9' height='7' rx='3.5' fill='none' stroke='%23e8ff47' stroke-width='2'/%3E%3Crect x='17' y='11' width='9' height='7' rx='3.5' fill='none' stroke='%23e8ff47' stroke-width='2'/%3E%3Cpath d='M15 14h2M26 13c2 0 3 1 3 2' stroke='%23e8ff47' stroke-width='2' fill='none'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --fg:255,255,255; --bg:#0e0e10; --card:#1d1d22; --ink:#e8ff47;
    --btn-bg:rgba(255,255,255,.07); --btn-border:rgba(255,255,255,.16);
    --disp:'Unbounded',sans-serif; --body:'Mulish',sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:rgb(var(--fg));font-family:var(--body);overscroll-behavior:none}
  #feed{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;transition:transform .2s ease,opacity .2s ease}
  #feed::-webkit-scrollbar{display:none}
  .card{position:relative;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;
    display:flex;flex-direction:column;justify-content:flex-end;background:#000}
  .stage{position:absolute;inset:0;overflow:hidden}
  .poster{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);object-fit:cover;transition:opacity .4s}
  .card.horiz .poster{object-fit:contain}
  .card.horiz .poster.bgp{object-fit:cover;filter:blur(28px) brightness(.5);transform:scale(1.25)}
  video{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);opacity:0;transition:opacity .4s}
  .card.vert  video.main{object-fit:cover}
  .card.horiz video.main{object-fit:contain}
  video.bg{object-fit:cover;filter:blur(28px) brightness(.5);transform:scale(1.2)}
  .card.playing video.main,.card.playing video.bg{opacity:1}
  .card.playing .poster:not(.bgp){opacity:0}
  .shade{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to top,rgba(0,0,0,.94) 0%,rgba(0,0,0,.2) 34%,transparent 55%,rgba(0,0,0,.34) 100%)}

  /* ── ВЕРХ: лого + вкладки категорий (как в TikTok) ── */
  .top{position:fixed;top:0;left:0;right:0;z-index:9;display:flex;align-items:center;gap:12px;
    padding:14px 16px 8px;background:linear-gradient(to bottom,rgba(0,0,0,.62),transparent)}
  .hdr{display:flex;align-items:center;gap:14px;min-width:0;flex:1;transition:transform .2s ease,opacity .2s ease}
  .logo{font-family:var(--disp);font-weight:900;font-size:16px;letter-spacing:-.02em;display:inline-flex;align-items:baseline;flex-shrink:0}
  .logo .r{color:#fff}.logo .d{color:#fff}
  .logo .b{color:#15151a;background:var(--ink);padding:1px 5px 2px 3px;border-radius:4px 7px 5px 5px;transform:rotate(-1.6deg);display:inline-block}
  .tabs{display:flex;gap:16px;overflow-x:auto;scrollbar-width:none;min-width:0}
  .tabs::-webkit-scrollbar{display:none}
  .tab{font-family:var(--disp);font-size:13px;font-weight:700;letter-spacing:.01em;color:rgba(255,255,255,.5);
    white-space:nowrap;cursor:pointer;padding:2px 0 6px;position:relative;flex-shrink:0}
  .tab.on{color:#fff}
  .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:var(--ink)}
  .toview{flex-shrink:0;display:grid;place-items:center;width:34px;height:34px;color:#fff;filter:drop-shadow(0 1px 5px rgba(0,0,0,.6))}
  .toview svg{width:22px;height:22px}
  /* дата-чип под шапкой */
  .datebar{position:fixed;top:50px;left:16px;z-index:12}
  .datechip{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-size:11px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;color:#fff;background:rgba(10,10,12,.6);backdrop-filter:blur(6px);
    border:1px solid var(--btn-border);padding:6px 12px;border-radius:100px;cursor:pointer}
  .datechip::after{content:"▾";font-size:9px;opacity:.7}
  .datemenu{position:absolute;top:38px;left:0;width:210px;max-height:56dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:rgba(20,20,24,.97);backdrop-filter:blur(12px);border:1px solid var(--btn-border);border-radius:16px;
    padding:6px;display:none;box-shadow:0 12px 40px rgba(0,0,0,.6)}
  .datemenu.open{display:block}
  .datemenu::-webkit-scrollbar{display:none}
  .dmi{display:flex;flex-direction:column;gap:1px;width:100%;text-align:left;background:none;border:0;cursor:pointer;
    padding:9px 12px;border-radius:10px;color:#fff}
  .dmi:active,.dmi.on{background:var(--btn-bg)}
  .dmi .drel{font-family:var(--disp);font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
  .dmi.on .drel{color:var(--ink)}
  .dmi .dabs{font-family:var(--body);font-size:12px;color:rgba(255,255,255,.55)}

  /* ── низ: инфо (заголовок ниже, цена + Подробнее в ряд) ── */
  .info{position:relative;z-index:5;padding:12px 84px calc(20px + env(safe-area-inset-bottom)) 20px;
    display:flex;flex-direction:column;gap:8px}
  .catchip{align-self:flex-start;display:inline-flex;align-items:center;gap:7px;font-family:var(--disp);
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 12px;min-height:28px;
    border-radius:100px;border:1px solid var(--btn-border);background:rgba(10,10,12,.5);backdrop-filter:blur(6px);color:rgba(255,255,255,.85);cursor:pointer}
  .catchip .dot{width:8px;height:8px;border-radius:50%}
  h1{font-family:var(--disp);font-weight:900;font-size:22px;line-height:1.14;margin:0;letter-spacing:-.01em;
    text-shadow:0 2px 16px rgba(0,0,0,.85);cursor:pointer}
  .meta{font-size:14px;color:rgba(255,255,255,.9);line-height:1.45;text-shadow:0 1px 10px rgba(0,0,0,.9)}
  .meta b{color:#fff;font-weight:700}
  .arow{display:flex;align-items:center;gap:12px;margin-top:2px}
  .ptag{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.03em;color:var(--ink);
    border:1px solid rgba(232,255,71,.5);background:rgba(232,255,71,.08);padding:7px 13px;border-radius:100px;white-space:nowrap}
  .ptag.free{color:#0b0b0d;background:var(--ink);border-color:var(--ink)}
  .cta-btn{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    text-decoration:none;padding:9px 18px;border-radius:100px;background:var(--btn-bg);border:1px solid var(--btn-border);
    color:#fff;backdrop-filter:blur(6px);white-space:nowrap}

  /* правый борт */
  .rail{position:absolute;right:8px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:6;display:flex;flex-direction:column;gap:20px;align-items:center}
  .rail button{width:46px;height:46px;border:0;background:none;color:#fff;display:grid;place-items:center;cursor:pointer;
    transition:transform .12s;filter:drop-shadow(0 1px 5px rgba(0,0,0,.55))}
  .rail button:active{transform:scale(.85)}
  .rail button svg{width:32px;height:32px;stroke-width:1.8}
  .rail button.on{color:var(--ink)}
  .rail button.on svg{fill:currentColor}
  .rail button.av{width:44px;height:44px;border-radius:50%;background:var(--card);border:2px solid #fff;overflow:hidden}
  .rail button.av svg{width:24px;height:24px;color:rgba(255,255,255,.85)}

  .sound{position:fixed;top:52px;right:16px;z-index:9;width:38px;height:38px;border:0;background:none;color:#fff;
    cursor:pointer;display:grid;place-items:center;filter:drop-shadow(0 1px 6px rgba(0,0,0,.7))}
  .sound svg{width:23px;height:23px}
  .sound.on{color:var(--ink)}

  /* разворот описания */
  .expand{position:absolute;inset:0;z-index:12;display:flex;flex-direction:column;justify-content:flex-end;
    padding:0 20px calc(24px + env(safe-area-inset-bottom));opacity:0;pointer-events:none;transition:opacity .25s;
    background:linear-gradient(to top,rgba(0,0,0,.93) 0%,rgba(0,0,0,.82) 55%,rgba(0,0,0,.5) 100%)}
  .card.open .expand{opacity:1;pointer-events:auto}
  .expand .x{position:absolute;top:60px;right:18px;width:34px;height:34px;border-radius:50%;border:1px solid var(--btn-border);
    background:var(--btn-bg);color:#fff;font-size:16px;display:grid;place-items:center}
  .expand h3{font-family:var(--disp);font-weight:900;font-size:21px;margin:0 0 6px}
  .expand .esub{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:14px}
  .expand .etext{font-size:15.5px;line-height:1.6;color:rgba(255,255,255,.92);max-height:48dvh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;white-space:pre-line}
  .expand .cta-buy{display:inline-block;margin-top:16px;font-family:var(--disp);font-weight:700;font-size:13px;
    letter-spacing:.06em;text-transform:uppercase;text-decoration:none;padding:13px 24px;border-radius:100px;background:var(--ink);color:#0b0b0d}

  .toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(16px);background:rgba(20,20,24,.96);
    border:1px solid rgba(255,255,255,.1);padding:11px 18px;border-radius:14px;font-family:var(--body);font-size:14px;
    font-weight:700;z-index:30;opacity:0;transition:.22s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="top">
  <div class="hdr" id="hdr"><div class="tabs" id="tabs"></div></div>
</div>
<div class="datebar">
  <button class="datechip" id="datechip"></button>
  <div class="datemenu" id="datemenu"></div>
</div>
<button class="sound" id="sound" title="звук"></button>
<div id="feed"></div>
<div class="toast" id="toast"></div>

<script>
const CAT_COLOR={ "Концерты":"#e8ff47","Театр":"#ff6b6b","Выставки":"#a78bfa","Стендап":"#ff9e3d",
  "Детям":"#b9f0a0","Кино":"#34d399","Лекции":"#38bdf8","Фестивали":"#fbbf24","Спорт":"#f97316",
  "Классика":"#6d8cff","Клубы":"#d946ef","Еда":"#fb7185","Другое":"#64748b" };
const RU_MONTH=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
const MON_GEN=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const WD_PREP=["в воскресенье","в понедельник","во вторник","в среду","в четверг","в пятницу","в субботу"];
const ICON={
 heart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
 bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
 share:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>',
 user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
 grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
 soundOff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>',
 soundOn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>' };

function fmtDate(s){ if(!s) return ""; const d=new Date(s.replace(" ","T")); if(isNaN(d)) return "";
  const wd=["вс","пн","вт","ср","чт","пт","сб"][d.getDay()];
  return `${wd}, ${d.getDate()} ${RU_MONTH[d.getMonth()]} · ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }
function relDate(s){ if(!s) return ""; const d=new Date(s.replace(" ","T")); if(isNaN(d)) return "";
  const t=new Date(); t.setHours(0,0,0,0); const e=new Date(d); e.setHours(0,0,0,0);
  const diff=Math.round((e-t)/864e5);
  if(diff===0) return "сегодня"; if(diff===1) return "завтра";
  if(diff>=2 && diff<=6) return WD_PREP[d.getDay()];
  return d.getDate()+" "+MON_GEN[d.getMonth()]; }
function firstLine(t){ return (t||"").split(/[\.\n!|]/)[0].trim().slice(0,70); }
function poster(e){ return e.file.replace("vid/","poster/").replace(".mp4",".jpg"); }

const fav=new Set(); let ALL=[]; let VIEW=[]; let SOUND=false; let ACTIVE=-1; let curCat=null; let TABS=[];
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),1400); }

function cardHTML(e,i){
  const orient=e.orient==="horiz"?"horiz":"vert";
  const cat=e.cat||""; const col=CAT_COLOR[cat]||"#cfcfd6";
  const priceTxt = e.is_free ? "Бесплатно" : (e.price_from!=null ? `от ${Math.round(e.price_from)} €` : "");
  const title = e.ev_title || firstLine(e.title) || e.page;
  const place = e.venue || e.page;
  // чип категории — только когда смотрим ВСЕ категории
  const chip = (curCat===null && cat) ? `<span class="catchip" data-act="setcat" data-cat="${cat}"><span class="dot" style="background:${col}"></span>${cat}</span>` : "";
  const bgPoster = orient==="horiz" ? `<img class="poster bgp" src="${poster(e)}" alt="">` : "";
  return `<div class="card ${orient}" data-i="${i}">
    <div class="stage">${bgPoster}<img class="poster" src="${poster(e)}" alt=""></div>
    <div class="shade"></div>
    <div class="rail">
      <button data-act="fav" class="${fav.has(e.id)?"on":""}">${ICON.heart}</button>
      <button data-act="remind">${ICON.bell}</button>
      <button data-act="share">${ICON.share}</button>
      <button class="av" data-act="me">${ICON.user}</button>
    </div>
    <div class="info">
      ${chip}
      <h1 data-act="details">${title}</h1>
      ${place?`<div class="meta">${place}</div>`:""}
      <div class="arow">
        ${priceTxt?`<span class="ptag ${e.is_free?"free":""}">${priceTxt}</span>`:""}
        <a class="cta-btn" data-act="details" href="#">Подробнее →</a>
      </div>
    </div>
    <div class="expand">
      <button class="x" data-act="close">✕</button>
      <h3>${title}</h3>
      <div class="esub">${e.date?fmtDate(e.date):""}${e.venue?" · "+e.venue:(e.page?" · "+e.page:"")}</div>
      <div class="etext">${(e.body||"Описание появится позже.").trim()}</div>
      ${e.ticket?`<a class="cta-buy" href="${e.ticket}" target="_blank" rel="noopener">Билеты · ${priceTxt} →</a>`:""}
    </div>
  </div>`;
}

// ── видео: монтируем только активной ±1 ──
function mountVideo(card){
  if(card.querySelector("video.main")) return card.querySelector("video.main");
  const e=VIEW[+card.dataset.i], stage=card.querySelector(".stage");
  const prep=(vd,cls)=>{ vd.className=cls;vd.src=e.file;vd.loop=true;vd.playsInline=true;vd.muted=true;vd.defaultMuted=true;
    vd.setAttribute("muted","");vd.setAttribute("playsinline","");vd.setAttribute("webkit-playsinline","");vd.setAttribute("autoplay","");vd.preload="auto"; };
  if(e.orient==="horiz"){ const bg=document.createElement("video");prep(bg,"bg");stage.appendChild(bg); }
  const v=document.createElement("video");prep(v,"main");stage.appendChild(v); return v;
}
function unmountVideo(card){ card.classList.remove("playing");
  card.querySelectorAll("video").forEach(v=>{ v.pause(); v.removeAttribute("src"); v.load(); v.remove(); }); }

function setActive(i){
  if(i===ACTIVE) return;
  const prev=document.querySelector(`.card[data-i="${ACTIVE}"]`); if(prev) prev.classList.remove("open");
  ACTIVE=i;
  const cards=[...document.querySelectorAll(".card")];
  cards.forEach(c=>{
    const idx=+c.dataset.i, near=Math.abs(idx-i)<=1;
    if(!near){ unmountVideo(c); return; }
    const v=mountVideo(c);
    if(idx===i){ v.muted=!SOUND; const bg=c.querySelector("video.bg");
      const go=()=>{ v.currentTime=0; v.play().catch(()=>{}); if(bg){bg.currentTime=0;bg.muted=true;bg.play().catch(()=>{});} };
      if(v.readyState>=2) go(); else v.addEventListener("loadeddata",go,{once:true});
      v.addEventListener("playing",()=>c.classList.add("playing"),{once:true});
    } else { c.classList.remove("playing"); v.pause(); const bg=c.querySelector("video.bg"); if(bg) bg.pause(); }
  });
  const e=VIEW[i]; if(e) document.getElementById("datechip").textContent=relDate(e.date);
}
const soundBtn=document.getElementById("sound");
function renderSound(){ soundBtn.innerHTML=SOUND?ICON.soundOn:ICON.soundOff; soundBtn.classList.toggle("on",SOUND); }
soundBtn.addEventListener("click",()=>{ SOUND=!SOUND; renderSound();
  document.querySelectorAll(".card").forEach(c=>{ const v=c.querySelector("video.main"); if(v) v.muted=!(SOUND && +c.dataset.i===ACTIVE); });
  const av=document.querySelector(`.card[data-i="${ACTIVE}"] video.main`); if(av && SOUND) av.play().catch(()=>{});
  toast(SOUND?"Звук включён":"Без звука"); });
renderSound();

// ── жесты: гориз = смена категории, верт = скролл; на последней карточке доскролл вверх = следующая категория ──
function bindGestures(card){
  let x0=0,y0=0,dx=0,dy=0,horiz=null,drag=false;
  const start=(x,y)=>{ if(card.classList.contains("open"))return; x0=x;y0=y;dx=dy=0;horiz=null;drag=true;};
  const move=(x,y)=>{ if(!drag)return; dx=x-x0;dy=y-y0;
    if(horiz===null && (Math.abs(dx)>10||Math.abs(dy)>10)) horiz=Math.abs(dx)>Math.abs(dy);
    if(horiz){ document.getElementById("hdr").style.transform=`translateX(${dx*0.4}px)`;
      document.getElementById("feed").style.transform=`translateX(${dx*0.25}px)`; } };
  const end=()=>{ if(!drag)return; drag=false;
    document.getElementById("hdr").style.transform=""; document.getElementById("feed").style.transform="";
    if(horiz && Math.abs(dx)>70){ switchCategory(dx<0?1:-1); } };
  card.addEventListener("touchstart",e=>start(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  card.addEventListener("touchmove",e=>{ move(e.touches[0].clientX,e.touches[0].clientY); if(horiz) e.preventDefault(); },{passive:false});
  card.addEventListener("touchend",end);
  card.addEventListener("mousedown",e=>start(e.clientX,e.clientY));
  window.addEventListener("mousemove",e=>drag&&move(e.clientX,e.clientY));
  window.addEventListener("mouseup",end);
}
function bindExpandSwipe(card){
  const ex=card.querySelector(".expand"), et=ex.querySelector(".etext");
  let y0=0,on=false;
  ex.addEventListener("touchstart",e=>{ y0=e.touches[0].clientY; on=true; },{passive:true});
  ex.addEventListener("touchend",e=>{ if(!on)return; on=false; const dy=e.changedTouches[0].clientY-y0;
    if(dy>70 && et.scrollTop<=2){ card.classList.remove("open"); }
    else if(dy<-70 && et.scrollTop+et.clientHeight>=et.scrollHeight-4){ card.classList.remove("open");
      document.getElementById("feed").scrollBy({top:window.innerHeight,behavior:"smooth"}); } });
}
function bindActions(card){
  card.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click",ev=>{ ev.stopPropagation(); if(el.tagName==="A"&&el.dataset.act) ev.preventDefault();
      const act=el.dataset.act, e=VIEW[+card.dataset.i];
      if(act==="details") card.classList.toggle("open");
      else if(act==="close") card.classList.remove("open");
      else if(act==="setcat"){ setCategory(el.dataset.cat,1); }
      else if(act==="me"){ toast("Профиль: настройки, вход, избранное"); }
      else if(act==="fav"){ if(fav.has(e.id)){fav.delete(e.id);el.classList.remove("on");toast("Убрано из избранного");}
        else{fav.add(e.id);el.classList.add("on");toast("В избранном");} }
      else if(act==="remind"){ el.classList.add("on"); toast("🔔 Напомним за 2 часа до события"); }
      else if(act==="share"){ const u=e.ticket||e.lib;
        if(navigator.share) navigator.share({title:e.ev_title||e.page,url:u}).catch(()=>{});
        else{ navigator.clipboard?.writeText(u); toast("Ссылка скопирована"); } }
    });
  });
}

// ── категории (вкладки + переключение) ──
function currentList(){
  return ALL.filter(e=>curCat===null || (e.cat||"")===curCat)
            .slice().sort((a,b)=>String(a.date||"9999").localeCompare(String(b.date||"9999")));
}
function buildTabs(){
  const counts={}; ALL.forEach(e=>{ const c=e.cat||""; if(c) counts[c]=(counts[c]||0)+1; });
  const present=Object.keys(CAT_COLOR).filter(c=>counts[c]);
  TABS=["", ...present];                                  // "" = Все
  const el=document.getElementById("tabs");
  el.innerHTML=TABS.map(c=>`<span class="tab ${((curCat||"")===c)?'on':''}" data-cat="${c}">${c||"Все"}</span>`).join("");
  el.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>setCategory(t.dataset.cat,0)));
}
function updateTabs(){
  document.querySelectorAll("#tabs .tab").forEach(t=>{
    const on=(curCat||"")===t.dataset.cat; t.classList.toggle("on",on);
    if(on) t.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
  });
}
function setCategory(cat, dir){
  const next = cat===""?null:cat;
  if(next===curCat){ return; }
  curCat=next;
  const feed=document.getElementById("feed");
  feed.style.transform=`translateX(${dir>0?-36:(dir<0?36:0)}px)`; feed.style.opacity="0";
  setTimeout(()=>{ buildFeed(currentList());
    feed.style.transition="none"; feed.style.transform=`translateX(${dir>0?36:(dir<0?-36:0)}px)`;
    requestAnimationFrame(()=>{ feed.style.transition=""; feed.style.transform="translateX(0)"; feed.style.opacity="1"; });
    updateTabs();
    const lbl=curCat||"Все"; toast("Категория: "+lbl);
  },180);
}
function switchCategory(dir){
  let i=TABS.indexOf(curCat||"");
  i+=dir; if(i<0) i=TABS.length-1; if(i>=TABS.length) i=0;
  setCategory(TABS[i], dir);
}

let _io=null;
function buildFeed(list){
  VIEW=list; ACTIVE=-1;
  const feed=document.getElementById("feed");
  feed.innerHTML = VIEW.length ? VIEW.map(cardHTML).join("") : "";
  const cards=[...feed.querySelectorAll(".card")];
  cards.forEach(c=>{bindGestures(c);bindActions(c);bindExpandSwipe(c);});
  if(_io) _io.disconnect();
  _io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting&&en.intersectionRatio>0.6) setActive(+en.target.dataset.i); }); },{threshold:[0,.6,1]});
  cards.forEach(c=>_io.observe(c));
  if(cards.length) setActive(0);
  buildDateMenu();
}

// ── выпадающий список дат (даты текущей категории, со скроллом) ──
function buildDateMenu(){
  const menu=document.getElementById("datemenu");
  const seen=new Map();                                    // деньYYYY-MM-DD → индекс первого ролика
  VIEW.forEach((e,i)=>{ if(!e.date) return; const k=e.date.slice(0,10); if(!seen.has(k)) seen.set(k,i); });
  menu.innerHTML=[...seen.entries()].map(([k,idx])=>{
    const d=new Date(k+"T00:00:00"); const wd=["вс","пн","вт","ср","чт","пт","сб"][d.getDay()];
    return `<button class="dmi" data-idx="${idx}"><span class="drel">${relDate(k+" 00:00:00")}</span><span class="dabs">${d.getDate()} ${MON_GEN[d.getMonth()]}, ${wd}</span></button>`;
  }).join("");
  menu.querySelectorAll(".dmi").forEach(b=>b.addEventListener("click",()=>{
    menu.classList.remove("open");
    const card=document.querySelector(`.card[data-i="${b.dataset.idx}"]`);
    if(card){ document.getElementById("feed").scrollTo({top:card.offsetTop}); setActive(+b.dataset.idx); }  // мгновенно + сразу активируем
  }));
}
(function(){
  const chip=document.getElementById("datechip"), menu=document.getElementById("datemenu");
  chip.addEventListener("click",e=>{ e.stopPropagation(); menu.classList.toggle("open"); });
  document.addEventListener("click",e=>{ if(!e.target.closest(".datebar")) menu.classList.remove("open"); });
})();

// авто-переход на следующую категорию, если домотал текущую до конца
(function(){
  const feed=document.getElementById("feed");
  let sy=0, over=0, atEnd=false;
  feed.addEventListener("touchstart",e=>{ sy=e.touches[0].clientY; over=0;
    atEnd = feed.scrollTop+feed.clientHeight >= feed.scrollHeight-2; },{passive:true});
  feed.addEventListener("touchmove",e=>{ if(atEnd){ const d=sy-e.touches[0].clientY; if(d>0) over=d; } },{passive:true});
  feed.addEventListener("touchend",()=>{ if(atEnd && over>55 && curCat!==null){ switchCategory(1); } over=0; });
})();

// «Афиша» (переключалка на сайт) спрятана — при желании вернём в настройки под аватаром (data-act="me")

async function boot(){
  ALL=await (await fetch("feed_ads.json",{cache:"no-store"})).json();
  buildTabs();
  buildFeed(currentList());
  let unlocked=false;
  const unlock=()=>{ if(unlocked)return; unlocked=true;
    const v=document.querySelector(`.card[data-i="${ACTIVE}"] video.main`); if(v){ v.muted=!SOUND; v.play().catch(()=>{}); } };
  ["touchstart","click","scroll"].forEach(ev=>window.addEventListener(ev,unlock,{once:true,passive:true}));
}
boot();
</script>
