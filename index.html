<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>riga.2see — лента</title>
<!-- OG-теги: значения по умолчанию для корня; для ?e=<id> их подменяет edge-функция functions/_middleware.js (краулеры соцсетей не исполняют JS, поэтому подмена — на сервере) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="riga.2see">
<meta property="og:title" content="riga.2see — что в Риге прямо сейчас">
<meta property="og:description" content="Лента культурных событий Риги: концерты, театр, выставки. Листай — и выбирай, куда пойти.">
<meta property="og:image" content="https://feed.2see.live/og-default.jpg">
<meta property="og:url" content="https://feed.2see.live/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="riga.2see — что в Риге прямо сейчас">
<meta name="twitter:description" content="Лента культурных событий Риги: концерты, театр, выставки.">
<meta name="twitter:image" content="https://feed.2see.live/og-default.jpg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2see">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --fg:255,255,255; --bg:#0e0e10; --card:#1d1d22; --ink:#e8ff47;
    --btn-bg:rgba(255,255,255,.07); --btn-border:rgba(255,255,255,.16);
    --disp:'Unbounded',sans-serif; --body:'Mulish',sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:rgb(var(--fg));font-family:var(--body);overscroll-behavior:none}
  #feed{height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;transition:transform .2s ease,opacity .2s ease}
  #feed::-webkit-scrollbar{display:none}
  .card{position:relative;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;
    display:flex;flex-direction:column;justify-content:flex-end;background:#000}
  .stage{position:absolute;inset:0;overflow:hidden}
  .nocover{position:absolute;inset:0}
  /* СИСТЕМНО: постер-афиша ВСЕГДА целиком (contain), нигде не обрезается; за ним — размытая заливка того же кадра */
  .poster{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);object-fit:contain;object-position:center;transition:opacity .4s}
  .poster.bgp{object-fit:cover;object-position:center;filter:blur(28px) brightness(.5);transform:scale(1.25)}
  .card.horiz .poster:not(.bgp),.card.photo .poster:not(.bgp){object-position:50% 28%}   /* горизонт/квадрат — постер выше, не по центру (под ним место для текста) */
  video,iframe.main{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);opacity:0;transition:opacity .4s;border:0}
  .tapcatch{position:absolute;inset:0;background:transparent}
  .card.vert  video.main{object-fit:contain;object-position:50% 30%}   /* приподнять: адлиб-ролики часто горизонт-контент, залетбоксенный в портретный файл — так полоса садится выше, не по центру */
  /* 18% тут раньше стояло «на глаз» и клало центр полосы на 222px вместо 281px (выше трети на 59px).
     Точное значение зависит от пропорций файла → считает JS (fitHorizThird), тут только запасное на время загрузки. */
  .card.horiz video.main{object-fit:contain;object-position:50% 26%}
  /* YouTube-эмбед (iframe) не понимает object-position — пришпиливаем его 16:9-полосой к верхней части */
  .card.horiz iframe.main{top:13%;bottom:auto;height:auto;aspect-ratio:16/9}
  /* значок «повернуть» — только когда ориентация ролика НЕ совпадает с ориентацией экрана; чистый CSS (orientation media), без JS */
  .rotatehint{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;
    flex-direction:column;align-items:center;justify-content:center;gap:0;width:58px;height:58px;border-radius:50%;
    background:rgba(14,14,17,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.22);
    cursor:pointer;pointer-events:auto}
  .rotatehint svg{width:26px;height:26px;color:#fff}
  .rotatehint span{position:absolute;top:100%;margin-top:8px;white-space:nowrap;font-family:var(--disp);font-weight:700;
    font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);text-shadow:0 1px 4px rgba(0,0,0,.8)}
  /* портрет-экран, гориз-ролик: значок ПОД полосой видео, а не поверх неё (owner 2026-07-23:
     «чтобы можно было всё же видео смотреть и без поворота»). Точное место зависит от пропорций
     файла — ставит JS (fitHorizThird), здесь только запасное значение на время загрузки. */
  @media not (orientation:landscape){ .card.horiz .rotatehint{display:flex;top:48%} }
  @media (orientation:landscape){ .card.vert .rotatehint{display:flex} }        /* ландшафт-экран, верт-ролик */
  body.clean .rotatehint{opacity:0;pointer-events:none}
  .card.af video.main{object-fit:cover}   /* автофон-клипы заполняют кадр (постер под ними — общее правило .poster contain) */
  .card .stage video.afbuf{opacity:0;transition:opacity .9s ease}   /* автофон: два буфера, медленный кроссфейд встык */
  .card .stage video.afbuf.afon{opacity:1}
  video.bg{object-fit:cover;filter:blur(28px) brightness(.5);transform:scale(1.2)}
  .card.playing video.main,.card.playing video.bg,.card.playing iframe.main{opacity:1}
  .card.playing .poster:not(.bgp){opacity:0}
  /* затемнение только от заголовка и ниже — верх видео остаётся ярким, без лишней дымки */
  .shade{position:absolute;inset:0;pointer-events:none;transition:background .3s;
    background:linear-gradient(to top,rgba(0,0,0,.94) 0%,rgba(0,0,0,.55) 26%,rgba(0,0,0,.12) 38%,transparent 46%)}
  .card.open .shade{background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.9) 67%,rgba(0,0,0,.55) 100%)}

  /* верх: вкладки категорий / шапка избранного — увеличено х2 */
  .top{position:fixed;top:0;left:0;right:0;z-index:9;display:flex;align-items:center;padding:18px 16px 12px;
    background:linear-gradient(to bottom,rgba(0,0,0,.68),transparent)}
  /* лого скроллится единой связкой с категориями (не отдельно) — но центрирование НЕ применяем для «Все» и соседней, чтобы не выталкивало лого */
  .hdr{display:flex;align-items:center;gap:18px;min-width:0;flex:1;overflow-x:auto;scrollbar-width:none;transition:transform .2s ease,opacity .2s ease;touch-action:pan-x}   /* pan-x — палец по категориям скроллит ТОЛЬКО их, не ленту вниз/вверх */
  .hdr::-webkit-scrollbar{display:none}
  .logo{font-family:var(--disp);font-weight:900;font-size:17px;letter-spacing:-.02em;display:inline-flex;align-items:baseline;flex-shrink:0}
  .logo .r,.logo .d{color:#fff}
  /* «2see» — тот же крафт-маркер, что в проде (static/index.html .l-brand): не плоская заливка, а текстура +
     рваный контур через SVG-фильтр #mrough (feTurbulence/feDisplacementMap, определён в body). Раньше тут
     была плоская упрощённая версия — не из брендбука, донесли на скорую руку. */
  .logo .b{color:#15151a;font-weight:900;position:relative;display:inline-block;padding:2px 4px 2px 1px;transform:rotate(-1.6deg);background:transparent}
  .logo .b::before{content:"";position:absolute;top:-1px;bottom:-1px;left:-1px;right:0;z-index:-1;
    border-radius:3px 6px 5px 4px / 4px 7px 5px 5px;filter:url(#mrough);
    background:repeating-linear-gradient(93deg, transparent 0 6px, rgba(255,255,255,.11) 6px 8px), var(--ink)}
  .tabs{display:flex;gap:20px;flex-shrink:0}
  .tab{font-family:var(--disp);font-size:16px;font-weight:700;color:rgba(255,255,255,.5);white-space:nowrap;
    cursor:pointer;padding:2px 0 8px;position:relative;flex-shrink:0}
  .tab.on{color:#fff}
  .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;border-radius:2px;background:var(--ink)}
  .favhdr{display:none;align-items:center;gap:8px;padding-right:12px}
  .favttl{flex:1;min-width:0}
  .favhdr.on{display:flex}
  .favcopy{margin-left:auto;font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:.02em;text-transform:uppercase;
    color:#fff;background:rgba(255,255,255,.1);border:1px solid var(--btn-border);border-radius:100px;padding:8px 14px;cursor:pointer;white-space:nowrap}
  .favback{width:34px;height:34px;border:0;background:none;color:#fff;cursor:pointer;display:grid;place-items:center;filter:drop-shadow(0 1px 5px rgba(0,0,0,.6))}
  .favback svg{width:24px;height:24px}
  .favttl{font-family:var(--disp);font-weight:900;font-size:22px;color:#fff}

  .datebar{position:fixed;top:66px;left:20px;z-index:12}
  .datechip{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-size:11px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;color:#fff;background:rgba(14,14,17,.88);
    border:1px solid var(--btn-border);padding:6px 12px;border-radius:100px;cursor:pointer}
  .datechip::after{content:"▾";font-size:9px;opacity:.7}
  .datemenu{position:absolute;top:38px;left:0;width:max-content;min-width:108px;max-height:56dvh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;background:rgba(20,20,26,.45);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:5px;display:none;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .datemenu.open{display:block}
  .datemenu::-webkit-scrollbar{display:none}
  .dmi{display:block;width:100%;text-align:left;background:none;border:0;cursor:pointer;padding:9px 14px;border-radius:9px;
    color:#fff;font-family:var(--disp);font-size:12px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
  .dmi:active{background:var(--btn-bg)}

  /* низ */
  .info{position:relative;z-index:5;padding:12px 84px calc(20px + env(safe-area-inset-bottom)) 20px;
    display:flex;flex-direction:column;gap:8px}
  .catchip{align-self:flex-start;display:inline-flex;align-items:center;gap:7px;font-family:var(--disp);
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 12px;min-height:28px;margin-left:-12px;
    border-radius:100px;border:1px solid var(--btn-border);background:rgba(14,14,17,.82);color:rgba(255,255,255,.85);cursor:pointer}
  .catchip .dot{width:8px;height:8px;border-radius:50%}
  h1{font-family:var(--disp);font-weight:900;font-size:18px;line-height:1.2;margin:0;letter-spacing:-.01em;
    text-shadow:0 2px 16px rgba(0,0,0,.85);cursor:pointer}
  .chiprow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .railprice{margin-top:-14px;text-align:center;font-family:var(--disp);font-weight:800;font-size:11px;letter-spacing:.02em;color:var(--ink);text-shadow:0 1px 6px rgba(0,0,0,.8);pointer-events:none;min-height:12px}   /* цена под значком билета — в clean-режиме НЕ прячем (важная инфа) */
  .ownersrc{font-family:var(--disp);font-weight:800;font-size:16px;color:#ff5cf0;text-shadow:0 1px 8px rgba(0,0,0,.9);margin-bottom:6px;letter-spacing:.01em}   /* спец-метка источника видео только для owner */
  body.clean .ownersrc{opacity:1}   /* owner-метку в clean-режиме НЕ прячем — она рабочая */
  .avmenu{position:fixed;right:8px;bottom:calc(74px + env(safe-area-inset-bottom));z-index:30;display:none;flex-direction:column;gap:8px;
    background:rgba(20,20,26,.92);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:10px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .avmenu.open{display:flex}
  .avm-langs{display:flex;gap:4px}
  .avm-langs button{width:42px;height:34px;border:0;border-radius:10px;background:rgba(255,255,255,.08);color:#fff;font-family:var(--disp);font-weight:800;font-size:12px;cursor:pointer}
  .avm-langs button.on{background:var(--ink);color:#15151a}
  .avm-fav{display:flex;align-items:center;gap:8px;border:0;background:none;color:#fff;font-family:var(--body);font-weight:700;font-size:14px;cursor:pointer;padding:6px 4px}
  .avm-fav svg{width:20px;height:20px}
  .chiprow .dateschip{align-self:auto}
  .dateschip{align-self:flex-start;display:inline-flex;font-family:var(--body);font-weight:700;font-size:13px;
    color:var(--ink);cursor:pointer;padding:5px 12px;border-radius:100px;
    background:rgba(30,30,34,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.14)}
  .datesfull{align-self:flex-start;max-width:100%;max-height:0;overflow:hidden;transition:max-height .3s ease;
    display:grid;grid-template-columns:1fr 1fr;gap:6px;border-radius:16px}   /* сеансы в 2 колонки */
  .card.datesopen .datesfull{max-height:30dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:6px;
    padding:8px;background:rgba(30,30,34,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  .datesfull .di{font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);
    border-radius:100px;padding:5px 11px;white-space:nowrap;text-align:center}
  /* свёрнутый превью — 3 строки + «ещё…»; видно только пока НЕ open */
  .preview{font-size:15px;line-height:1.5;color:rgba(255,255,255,.92);text-shadow:0 1px 10px rgba(0,0,0,.95);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
  .card.open .preview{display:none}
  .preview .more{color:var(--ink);font-weight:800;white-space:nowrap}
  /* инлайн-описание над заголовком: раскрывается на сколько нужно, скроллится */
  .desc{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .card.open .desc{max-height:46dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .desc::-webkit-scrollbar{display:none}
  .dtext{font-size:15px;line-height:1.55;color:#fff;white-space:pre-line;text-shadow:0 1px 10px rgba(0,0,0,.95);padding:2px 0}
  .dtext .collapse{color:var(--ink);font-weight:800;cursor:pointer;white-space:nowrap}
  .desc .buy{display:inline-block;margin:12px 0 4px;font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.06em;
    text-transform:uppercase;text-decoration:none;padding:12px 22px;border-radius:100px;background:rgba(255,255,255,.12);
    border:1px solid var(--btn-border);color:#fff}
  .meta{font-size:16px;font-weight:800;color:#fff;line-height:1.35;text-shadow:0 1px 10px rgba(0,0,0,.9);font-family:var(--body)}
  .dtext a,.preview a{color:var(--ink);font-weight:700;text-decoration:underline}
  .arow{display:flex;align-items:center;justify-content:flex-start;gap:12px;margin-top:2px}
  .ptag{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.03em;color:var(--ink);
    border:1px solid rgba(232,255,71,.5);background:rgba(232,255,71,.08);padding:7px 13px;border-radius:100px;white-space:nowrap}
  .ptag.free{color:#0b0b0d;background:var(--ink);border-color:var(--ink)}
  .cta-btn{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    text-decoration:none;padding:9px 18px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid var(--btn-border);
    color:#fff;white-space:nowrap}

  .rail{position:fixed;right:8px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:20;display:flex;flex-direction:column;gap:20px;align-items:center}
  .rail button,.rail a{width:46px;height:46px;border:0;background:none;color:#fff;display:grid;place-items:center;cursor:pointer;
    transition:transform .12s;filter:drop-shadow(0 1px 5px rgba(0,0,0,.55));text-decoration:none}
  .rail button:active,.rail a:active{transform:scale(.85)}
  .rail button svg,.rail a svg{width:32px;height:32px;stroke-width:1.8}
  .rail button.on{color:var(--ink)}
  .rail button.on svg{fill:currentColor}
  .rail button.av{position:relative;overflow:visible}   /* без кружка — голая иконка, как остальные в рейле */
  .rail a.ticket{position:relative;color:var(--ink);margin-top:-7px}   /* подтянуть к «переслать»; подпись «Билеты» уходит в зазор снизу */
  .ticket-hint{position:absolute;left:50%;top:100%;transform:translateX(-50%);white-space:nowrap;margin-top:-1px;
    font-family:var(--disp);font-weight:700;font-size:9px;letter-spacing:.03em;text-transform:uppercase;
    color:var(--ink);text-shadow:0 1px 4px rgba(0,0,0,.8);
    pointer-events:none;transition:opacity .3s ease}
  .ticket-hint.hide{opacity:0}
  .vidcred{position:absolute;right:12px;bottom:calc(38% + 6px);z-index:4;font-family:var(--body);font-size:9px;
    letter-spacing:.02em;color:rgba(255,255,255,.55);writing-mode:vertical-rl;text-orientation:mixed;
    text-shadow:0 1px 3px rgba(0,0,0,.7);pointer-events:none}
  body.clean .vidcred{opacity:0}
  .rail button.av svg{width:32px;height:32px;color:#fff}   /* в размер остальных иконок рейла */
  .favbadge{position:absolute;top:-5px;right:-6px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;
    background:var(--ink);color:#0b0b0d;font-family:var(--disp);font-size:10px;font-weight:800;display:grid;place-items:center;
    border:2px solid #0e0e10}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.55)}100%{transform:scale(1)}}
  .favbadge.bump{animation:pop .35s ease}
  .flybadge{position:fixed;z-index:40;width:26px;height:26px;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));
    transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .5s ease}
  .flybadge svg{width:26px;height:26px;fill:var(--ink);stroke:var(--ink)}

  .sound{position:fixed;top:56px;right:12px;z-index:9;width:46px;height:46px;border:0;background:none;color:#fff;
    cursor:pointer;display:grid;place-items:center;filter:drop-shadow(0 1px 6px rgba(0,0,0,.7))}
  .sound svg{width:32px;height:32px}
  .sound.on{color:var(--ink)}

  /* превью следующей/прошлой категории — «призрак», въезжает синхронно со свайпом */
  .ghost{position:fixed;inset:0;z-index:4;display:none;background:#000;overflow:hidden}
  .ghost.on{display:block}
  .ghost img{width:100%;height:100%;object-fit:cover}
  .empty{height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center}
  .empty span{display:inline-block;max-width:230px;font-family:var(--disp);font-weight:700;font-size:16px;
    line-height:1.5;color:rgba(255,255,255,.75)}
  .empty b{color:var(--ink)}
  /* тап по видео скрывает интерфейс */
  .top,.datebar,.sound,.rail,.info{transition:opacity .2s ease}
  body.clean .top,body.clean .datebar,body.clean .info{opacity:0;pointer-events:none}   /* mute (.sound) НЕ прячем — это управление, всегда доступно */
  /* нижний лист напоминаний */
  .sheet{position:fixed;inset:0;z-index:24;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s}
  .sheet.open{opacity:1;pointer-events:auto}
  .sheetcard{position:absolute;left:16px;right:16px;bottom:calc(20px + env(safe-area-inset-bottom));
    background:rgba(20,20,24,.99);border:1px solid var(--btn-border);border-radius:18px;
    padding:14px;transform:translateY(16px);transition:transform .25s;display:flex;flex-direction:column;gap:8px}
  .sheet.open .sheetcard{transform:translateY(0)}
  .sheet-ttl{font-family:var(--disp);font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
    color:rgba(255,255,255,.55);padding:2px 4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ropt{font-family:var(--disp);font-weight:700;font-size:14px;text-align:left;background:var(--btn-bg);
    border:1px solid var(--btn-border);color:#fff;padding:14px 16px;border-radius:12px;cursor:pointer}
  .ropt.on{background:var(--ink);color:#0b0b0d;border-color:var(--ink)}
  .ropt.off{color:#ff8a8a;background:rgba(255,80,80,.08);border-color:rgba(255,80,80,.3)}
  .chan-sub{font-size:13px;color:rgba(255,255,255,.55);padding:0 4px 8px;line-height:1.4}
  .chan-btn{display:flex;align-items:center;gap:12px;font-family:var(--disp);font-weight:700;font-size:14px;
    text-align:left;padding:14px 16px;border-radius:12px;cursor:pointer;border:1px solid var(--btn-border)}
  .chan-btn .ico{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
  .chan-btn .sub{font-family:var(--body);font-weight:400;font-size:12px;color:rgba(255,255,255,.55);margin-top:1px}
  .chan-btn.tg{background:rgba(232,255,71,.1);border-color:rgba(232,255,71,.4)}
  .chan-btn.tg .ico{background:var(--ink);color:#0b0b0d}
  .chan-btn.push,.chan-btn.mail{background:var(--btn-bg);color:#fff}
  .chan-btn.push .ico,.chan-btn.mail .ico{background:rgba(255,255,255,.12);color:#fff}
  .chan-rec{margin-left:auto;font-family:var(--disp);font-size:9px;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;color:#0b0b0d;background:var(--ink);padding:3px 8px;border-radius:100px}
  /* первый экран — вступительная заставка поверх ленты: видео-коллаж + стеклянная плашка. Скрывает рейл/дату/звук, шапка остаётся */
  body.hero-active .rail,body.hero-active .datebar,body.hero-active .sound{display:none}
  .hero{position:fixed;inset:0;z-index:6;background:#000;overflow:hidden;transition:transform .3s cubic-bezier(.33,0,.2,1)}
  .hero.out{transform:translateY(-100%);pointer-events:none}   /* уезжает целиком вверх, как смена поста в ленте — под ним уже первый ролик со всеми компонентами */
  /* z-index:0 — СВОЙ стек-контекст: кроссфейд поднимает z-index у видео внутри, и без этого они всплывали
     поверх .hero-shade/.hero-glass и закрывали заголовок. */
  .hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}   /* свайп не должен таскать/выделять видео как картинку — жест целиком ловит .hero */
  .hero-bg video{position:absolute;inset:-1px;width:calc(100% + 2px);height:calc(100% + 2px);object-fit:cover;opacity:0;transition:opacity .9s ease;
    -webkit-user-drag:none;user-select:none;-webkit-user-select:none}
  .hero-bg video.hon{opacity:1}
  .hero-shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,.15) 32%,rgba(0,0,0,.15) 62%,rgba(0,0,0,.6) 100%)}
  .hero-glass{position:absolute;left:20px;right:20px;bottom:calc(64px + env(safe-area-inset-bottom));text-align:center;
    background:rgba(255,255,255,.08);backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);
    border:1px solid rgba(255,255,255,.38);border-radius:26px;padding:34px 24px;box-shadow:0 16px 50px rgba(0,0,0,.4)}
  .hero-ttl{font-family:var(--disp);font-weight:900;font-size:25px;line-height:1.3;letter-spacing:-.01em;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .hero-sub{margin-top:8px;font-size:15px;font-weight:500;line-height:1.4;color:rgba(255,255,255,.86);text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .hero-cta{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:9px}
  .hero-hand{width:46px;height:46px;color:#fff;animation:heroBounce 1.6s ease-in-out infinite}
  .hero-cta-txt{font-family:var(--disp);font-weight:700;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.88)}
  @keyframes heroBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}
  @media (prefers-reduced-motion:reduce){ .hero-hand{animation:none} }
  .toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(16px);background:rgba(20,20,24,.96);
    border:1px solid rgba(255,255,255,.1);padding:11px 18px;border-radius:14px;font-family:var(--body);font-size:14px;
    font-weight:700;z-index:30;opacity:0;transition:.22s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ландшафт-экран на реальном телефоне короче, чем кажется (панели Safari съедают высоту) — режем жёстко:
     категории/дата прячем (второстепенное, пока смотрят видео), описание прячем, рейл и текст — в минимум.
     Блок — В КОНЦЕ style, иначе базовые правила ниже по каскаду (равный приоритет) их перебивают. */
  @media (orientation:landscape){
    /* один и тот же правый отступ для .top и #rail — иначе верхняя пара значков и колонка под ней едут не по одной
       вертикали и вся панель выглядит вкривь. Чёлка/динамик-айленд слева-справа — учитываем safe-area, не число. */
    :root{ --edgeR: max(12px, env(safe-area-inset-right)); --railTop: 40px; --iconsW: 92px; }   /* --railTop — запасное значение (JS подставляет реальное); --iconsW — ширина зоны mute+избранное (34+14+34+доп.отступ), .hdr должен освобождать под неё место сам, т.к. mute/fav больше не сидят в flex-потоке .top */
    .top{padding:6px var(--edgeR) 6px max(12px, env(safe-area-inset-left))}
    .tab{font-size:12px;padding-bottom:5px}     /* категории остаются, просто мельче — та же строка с лого, места хватает */
    /* категории не тянутся во всю ширину — обрываются (с плавным затуханием) до значков mute/избранное, а не залезают под них.
       Раньше .hdr сужался сам (topicons был реальным flex-соседом и отъедал место); теперь mute/fav — position:fixed
       и в раскладке .top не участвуют, поэтому место под них резервируем явно через margin-right. */
    .hdr{margin-right:var(--iconsW);-webkit-mask-image:linear-gradient(to right, black calc(100% - 28px), transparent); mask-image:linear-gradient(to right, black calc(100% - 28px), transparent)}
    .datebar{display:none}              /* дата есть в info-строке снизу */
    /* mute + избранное НИКУДА не переезжают в DOM (переезд ломал clean-режим — .top гаснет по тапу на видео и гасил
       их вместе с собой). Остаются на своих постоянных местах, просто визуально подтягиваются в верхнюю строку
       через fixed-позиционирование — тот же --railTop даёт им ту же вертикаль, что и остатку рейла ниже. */
    .sound{top:calc(var(--railTop)/2 - 17px);right:calc(var(--edgeR) + 48px);width:34px;height:34px}
    .rail [data-act="fav"]{position:fixed;top:calc(var(--railTop)/2 - 17px);right:var(--edgeR);z-index:20}
    .rail{gap:14px;right:var(--edgeR);bottom:auto;top:calc(var(--railTop) + 4px)}   /* впритык к реальному низу шапки, без зазора и без наезда */
    .rail button,.rail a{width:34px;height:34px}
    .rail button svg,.rail a svg,.rail button.av svg{width:23px;height:23px}
    .ticket-hint{display:none}
    .railprice{font-size:9px;margin-top:-6px}
    .vidcred{display:none}              /* декоративная подпись сбоку — убираем, не критична */
    /* рейл теперь висит вверху и короче — низ экрана свободен, полю info правый отступ под него больше не нужен.
       Но текст всё равно не на всю ширину — левые 2/3, чтобы правая треть с иконками смотрелась просторно, не впритык */
    .info{padding:4px max(14px, env(safe-area-inset-right)) calc(4px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));gap:4px;max-width:66%}
    .catchip{min-height:18px;font-size:8px;padding:0 8px;margin-left:-8px}
    h1{font-size:14px;-webkit-line-clamp:1;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
    .meta{font-size:11px}
    .preview{font-size:12px}
    .chiprow,.datesfull{display:none}   /* чипы дат — по-прежнему прячем, полное описание доступно по тапу на заголовок */
  }
</style>

const MONTHS={ ru:RU_MONTH, lv:["janv","febr","marts","apr","maijs","jūn","jūl","aug","sept","okt","nov","dec"],
  en:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"] };
function fmtDate(s){ if(!s) return ""; const d=new Date(s.replace(" ","T")); if(isNaN(d)) return "";
  const wd=WD[LANG][d.getDay()];
  return `${wd}, ${d.getDate()} ${MONTHS[LANG][d.getMonth()]} · ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }
// автофон-нарезка выключена: ~38 стоковых клипов мискаст-ят события (орган→гитара и т.п.) → везде чистый постер.
// вернуть = true (данные и плеер на месте), но только с нормальной библиотекой/настоящим видео.
const AUTOFON_ON=false;
function relDate(s){ if(!s) return ""; const d=new Date(s.replace(" ","T")); if(isNaN(d)) return "";
  const t=new Date(); t.setHours(0,0,0,0); const e=new Date(d); e.setHours(0,0,0,0);
  const diff=Math.round((e-t)/864e5);
  if(diff===0) return tr("today"); if(diff===1) return tr("tomorrow");
  const wd=WD[LANG][d.getDay()];
  const dm=`${d.getDate()}.${String(d.getMonth()+1).padStart(2,"0")}`;
  const yr=d.getFullYear()!==(new Date()).getFullYear() ? `.${String(d.getFullYear()).slice(2)}` : "";   // год виден, если не текущий — иначе «4.06» читается как прошлый июнь
  return `${wd} · ${dm}${yr}`; }
// только сегодняшние и будущие сеансы (прошедшее не показываем — реальные даты)
function futureDates(e){
  const t=new Date(); t.setHours(0,0,0,0); const t0=t.getTime();
  const src = (e.dates && e.dates.length) ? e.dates : (e.date ? [e.date] : []);
  return src.filter(d=>{ const x=new Date(d.replace(" ","T")); x.setHours(0,0,0,0); return x.getTime()>=t0; })
            .sort((a,b)=>String(a).localeCompare(String(b)));
}
function nearDate(e){ const f=futureDates(e); return f[0] || e.date || "9999"; }
// без реального описания ивент не показываем (пустое тело / заглушка «появится позже» = почти 0 инфы)
function hasDesc(e){ const b=(e.body||"").trim(); return b.length>=15 && !/появится позже/i.test(b); }
// чип «ближайшая дата +N» (пилюля) и отдельно раскрывающийся список сеансов
function dateChip(e){
  const future=futureDates(e);
  if(future.length<2) return "";
  return `<span class="dateschip" data-act="dates">${relDate(future[0])} +${future.length-1}</span>`;
}
function dateFull(e){
  const future=futureDates(e);
  if(future.length<2) return "";
  return `<div class="datesfull" data-act="closedates">${future.map(d=>`<span class="di">${fmtDate(d)}</span>`).join("")}</div>`;
}
function firstLine(t){ return (t||"").split(/[\.\n!|]/)[0].trim().slice(0,70); }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function linkify(t){ return esc(t).replace(/(https?:\/\/[^\s<]+)/g,u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`); }
function poster(e){ return e.img || (e.file? e.file.replace("vid/","poster/").replace(".mp4",".jpg") : ""); }
function vidUrl(e){ return e.video ? e.video.url : (e.file || null); }          // стрим-URL или локальный файл
function vidOrient(e){ return e.video ? e.video.orient : (e.orient || "vert"); }
function hasVideo(e){ return !!vidUrl(e); }

function reminderOpts(s){
  const d=new Date((s||"").replace(" ","T")); const t=new Date(); t.setHours(0,0,0,0);
  const e=new Date(d); e.setHours(0,0,0,0); const diff=Math.round((e-t)/864e5);
  if(isNaN(diff)) return ["remDay","rem2h"];
  if(diff<=0) return ["rem2h","rem1h"];
  if(diff===1) return ["remTonight","remTomorrowMorning","rem2h"];
  if(diff<=7) return ["remDay","remMorningOf","rem2h"];
  return ["remWeek","rem3days","remDay","rem2h"];
}

// пуш подтверждаем тестовым уведомлением — без этого доверять «разрешено» нельзя
function setupPush(){
  if(!("Notification" in window)){ toast(tr("pushUnsupported")); openChannelSheet(tr("pushUnsupportedSub")); return; }
  Notification.requestPermission().then(p=>{
    if(p!=="granted"){ toast(tr("pushDenied")); openChannelSheet(tr("pushDeniedSub")); return; }
    try{
      const n=new Notification(tr("pushTestTitle"), { body:tr("pushTestBody") });
      notifyChannel="push";
      toast(tr("pushCheckToast"));
      setTimeout(()=>n.close(),6000);
    }catch(e){ toast(tr("pushFailToast")); }
  });
}

    f.setAttribute("allow","autoplay; encrypted-media"); f.setAttribute("frameborder","0");

  { const bg=document.createElement("video");prep(bg,"bg");stage.appendChild(bg); }

// Горизонтальный (и квадратный) ролик на портрет-экране: при object-fit:contain видео — полоса с полями
// сверху/снизу. Owner: СЕРЕДИНА полосы должна стоять ровно на линии верхней трети экрана.
// Одной константой не выйдет: нужный процент зависит от пропорций файла (16:9 → 27.5%, 4:3 → 24.5%),
// а у нас есть и то, и другое, и квадраты. Поэтому считаем от РЕАЛЬНЫХ размеров видео.
//   object-position Y% при contain кладёт верх полосы на Y% свободного места, значит:
//   центр = Y%*(H-h) + h/2, приравниваем к H/3 и решаем относительно Y.
function fitHorizThird(v){
  const st=v.closest(".stage"); if(!st) return;
  const W=st.clientWidth, H=st.clientHeight;
  const vw=v.videoWidth, vh=v.videoHeight;
  if(!W||!H||!vw||!vh) return;
  const h=vh*Math.min(W/vw, H/vh);      // высота полосы видео после contain
  const free=H-h;
  if(free<=0.5){ v.style.objectPosition=""; return; }   // полей нет — двигать нечего
  const y=Math.max(0, Math.min(100, (H/3 - h/2)/free*100));
  v.style.objectPosition=`50% ${y.toFixed(2)}%`;
  placeRotateHint(v.closest(".card"), H/3 + h/2, H);    // низ полосы = центр(H/3) + половина высоты
}
// Постер-афиша: та же верхняя треть, что и у видео, но по РАЗМЕРАМ САМОЙ КАРТИНКИ, а не по классу
// карточки. Класс берётся из ориентации РОЛИКА, и когда ролик вертикальный, а афиша горизонтальная
// (случай owner-а 2026-07-23: «Elizabete Gaile» — ролик 720×1280, афиша широкая), постер оставался
// по центру. Вертикальная картинка заполняет кадр целиком — свободного места нет, и функция её
// не двигает: проверка free<=0.5 отсекает.
function fitPosterThird(img){
  if(!img || img.classList.contains("bgp")) return;      // размытая подложка — не трогаем
  const st=img.closest(".stage"); if(!st) return;
  const H=st.clientHeight, W=st.clientWidth;
  const iw=img.naturalWidth, ih=img.naturalHeight;
  if(!W||!H||!iw||!ih) return;
  const h=ih*Math.min(W/iw, H/ih);
  const free=H-h;
  if(free<=0.5){ img.style.objectPosition=""; return; }
  const y=Math.max(0, Math.min(100, (H/3 - h/2)/free*100));
  img.style.objectPosition=`50% ${y.toFixed(2)}%`;
}
// Значок «повернуть» ставим ПОД полосой видео, чтобы он её не закрывал (owner 2026-07-23).
// bottomPx — низ полосы видео; H — высота карточки. Значок 58px, ещё под ним подпись (~20px),
// поэтому от низа полосы отступаем на пол-значка + зазор, и держимся в пределах экрана.
function placeRotateHint(card, bottomPx, H){
  if(!card) return;
  const hint=card.querySelector(".rotatehint"); if(!hint) return;
  if(window.matchMedia("(orientation:landscape)").matches){ hint.style.top=""; return; }
  const GAP=18, HALF=29, TAIL=26;                       // зазор, полвысоты значка, место под подпись
  const top=Math.min(bottomPx + GAP + HALF, H - HALF - TAIL);
  hint.style.top=`${(top/H*100).toFixed(2)}%`;
}
// ── АВТОФОН: плейлист из кирпичиков. Каждый клип 1.5с из середины → следующий; в конце постер 3с; луп ──
function mountAutofon(card, e){
  const stage=card.querySelector(".stage");
  // два видео-буфера: пока играет один, во второй уже грузится следующий клип → переходы встык, без чёрных провалов
  const mk=()=>{ const v=document.createElement("video"); v.className="main afbuf"; v.muted=true; v.defaultMuted=true; v.playsInline=true;
    v.dataset.autofon="1";
    v.setAttribute("muted","");v.setAttribute("playsinline","");v.setAttribute("webkit-playsinline","");v.preload="auto"; return v; };
  const a=mk(), b=mk(); stage.appendChild(a); stage.appendChild(b);
  card._af={ list:e.autofon, bufs:[a,b], timers:[], running:false };
  return a;
}
function startAutofon(card){
  const af=card._af; if(!af || af.running) return; af.running=true;
  const CLIP=2800, HOLD=2500, N=af.list.length;   // каждый клип держим дольше + медленный фейд → переходы плавные, а не рваные
  const seekMid=v=>{ try{ v.currentTime=(v.duration||3)*0.4; }catch(_){} };
  // src в буфер + перемотка в середину клипа; резолвится, когда клип готов играть без задержки
  const prep=(v,url)=>new Promise(res=>{ if(v._url===url && v.readyState>=1){ res(); return; }
    v._url=url; v.src=url;
    const d=()=>{ seekMid(v); res(); };
    if(v.readyState>=1) d(); else v.addEventListener("loadedmetadata",d,{once:true}); });
  let idx=0, slot=0, preloaded=false;
  const tick=async()=>{
    if(!af.running) return;
    if(idx>=N){                                            // весь плейлист отыгран → короткая пауза на постере, потом заново по кругу
      af.bufs.forEach(v=>{ v.classList.remove("afon"); try{v.pause();}catch(_){} });
      idx=0; slot=0; preloaded=false;
      af.timers.push(setTimeout(tick, HOLD)); return; }
    const cur=af.bufs[slot];
    if(!preloaded) await prep(cur, af.list[idx].url);       // первый клип грузим здесь; дальше буфер уже предзагружен
    if(!af.running) return;
    seekMid(cur); cur.play().catch(()=>{});
    cur.classList.add("afon"); af.bufs[slot^1].classList.remove("afon");   // кроссфейд на текущий буфер
    if(idx+1<N){ preloaded=true; prep(af.bufs[slot^1], af.list[idx+1].url); } else preloaded=false;  // пока играет — тянем следующий клип
    idx++; slot^=1;
    af.timers.push(setTimeout(tick, CLIP));
  };
  tick();
}
function stopAutofon(card){ const af=card._af; if(!af) return; af.running=false;
  af.timers.forEach(clearTimeout); af.timers=[];
  if(af.bufs) af.bufs.forEach(v=>{ try{v.pause();}catch(_){} v.classList.remove("afon"); }); }
function unmountVideo(card){ card.classList.remove("playing"); stopAutofon(card); card._af=null;
  card.querySelectorAll("video, iframe.main").forEach(v=>{ if(v.tagName==="VIDEO"){v.pause();v.removeAttribute("src");v.load();} v.remove(); }); }
// Пока идёт поворот экрана, наблюдатель за прокруткой ОТКЛЮЧЁН (см. обработчик resize внизу).
// Без этого: поворот меняет высоту карточки → тот же scrollTop указывает на соседнюю →
// наблюдатель переключает активную → мы «довскролливаем» уже к ЧУЖОЙ карточке, и ролик
// перелистывается сам. Owner 2026-07-23: «поворачиваю экран — видео перелистывается на другое».
let REORIENTING=false;
function setActive(i){
  if(REORIENTING) return;
  if(i===ACTIVE) return;
  // при переключении на другой ролик — сбрасываем РАЗВЁРНУТЫЕ состояния карточки (описание, список дат)
  const prev=document.querySelector(`.card[data-i="${ACTIVE}"]`); if(prev){ prev.classList.remove("open"); prev.classList.remove("datesopen"); }
  document.body.classList.remove("clean");   // на новом ролике надписи возвращаем (owner: «чистый» режим — только для текущего ролика, не залипает между свайпами)
  if(document.fullscreenElement && document.fullscreenElement!==document.querySelector(`.card[data-i="${i}"]`)){
    document.exitFullscreen().catch(()=>{});
    try{ screen.orientation && screen.orientation.unlock && screen.orientation.unlock(); }catch(_){}
  }   // ушли с ролика, который принудительно развернули значком, — снимаем полноэкран/лок
  ACTIVE=i;
  const cards=[...document.querySelectorAll(".card")];
  cards.forEach(c=>{
    const idx=+c.dataset.i, near=Math.abs(idx-i)<=1;
    if(!near){ unmountVideo(c); return; }
    const v=mountVideo(c);
    if(!v){ c.classList.remove("playing"); return; }        // статичная карточка — только постер
    if(v.dataset && v.dataset.autofon){ if(idx===i) startAutofon(c); else stopAutofon(c); return; }   // автофон-плейлист
    if(v.tagName==="IFRAME"){ if(idx===i) c.classList.add("playing"); else c.classList.remove("playing"); return; }
    if(idx===i){ v.muted=!SOUND; const bg=c.querySelector("video.bg");
      const go=()=>{ v.currentTime=0; v.play().catch(()=>{}); if(bg){bg.currentTime=0;bg.muted=true;bg.play().catch(()=>{});} };
      if(v.readyState>=2) go(); else v.addEventListener("loadeddata",go,{once:true});
      v.addEventListener("playing",()=>c.classList.add("playing"),{once:true});

// жесты: открыто → свайп вниз закрывает; закрыто → гориз = смена категории
function bindGestures(card){
  let x0=0,y0=0,dx=0,dy=0,horiz=null,drag=false,tgt=null,moved=false;
  const desc=card.querySelector(".desc");
  const stage=card.querySelector(".stage"), info=card.querySelector(".info"), shade=card.querySelector(".shade");   // свайпается только контент ивента (картинка/видео+фон+текст), НЕ борт/шапка/дата
  const ghost=document.getElementById("ghost"), ghostimg=document.getElementById("ghostimg");
  let ghostDir=0;   // 1 = следующая категория (свайп влево), -1 = предыдущая (свайп вправо)
  const start=(x,y,t)=>{ x0=x;y0=y;dx=dy=0;horiz=null;drag=true;tgt=t;ghostDir=0;moved=false;};
  const move=(x,y)=>{ if(!drag)return; dx=x-x0;dy=y-y0;
    if(Math.abs(dx)>8||Math.abs(dy)>8) moved=true;
    if(horiz===null && (Math.abs(dx)>10||Math.abs(dy)>10)) horiz=Math.abs(dx)>Math.abs(dy);
    if(!card.classList.contains("open") && horiz && !favMode){
      // нативный свайп — вся карточка едет 1:1 с пальцем; навстречу въезжает превью соседней категории
      // шапка с категориями пальцем НЕ тащится — двигается только после отпускания, синхронно с посадкой карточки
      const fade=Math.max(0, 1-Math.abs(dx)/280);
      stage.style.transform=`translateX(${dx}px)`; info.style.transform=`translateX(${dx}px)`; shade.style.transform=`translateX(${dx}px)`;
      stage.style.opacity=fade; info.style.opacity=fade;
      const dir=dx<0?1:-1;
      if(ghostDir!==dir){ ghostDir=dir;
        let i=TABS.indexOf(curCat||"")+dir; if(i<0)i=TABS.length-1; if(i>=TABS.length)i=0;
        const item=firstItemFor(TABS[i]===""?null:TABS[i]);
        ghostimg.src=item?poster(item):""; ghost.classList.add("on"); ghost.style.transition="none"; }
      const W=window.innerWidth;
      ghost.style.transform=`translateX(${(dir>0?W:-W)+dx}px)`; } };
  const end=()=>{ if(!drag)return; drag=false;
    [stage,info,shade].forEach(el=>el.style.transition="transform .2s ease, opacity .2s ease");
    stage.style.transform=""; info.style.transform=""; shade.style.transform=""; stage.style.opacity=""; info.style.opacity="";
    setTimeout(()=>{ [stage,info,shade].forEach(el=>el.style.transition=""); },220);
    if(ghostDir){ const commit = horiz && Math.abs(dx)>70 && !favMode;
      ghost.style.transition="transform .2s ease";
      ghost.style.transform=`translateX(${commit?0:(ghostDir>0?window.innerWidth:-window.innerWidth)}px)`;
      setTimeout(()=>{ ghost.classList.remove("on"); ghost.style.transition=""; ghost.style.transform=""; }, commit?60:210); }
    if(horiz && Math.abs(dx)>70 && !favMode){ switchCategory(dx<0?1:-1); } };
  // ТАП по видео (без движения) — отдельным click'ом: срабатывает РОВНО один раз на любом устройстве
  // (touchend+синтетик-mouseup давали двойной тоггл = «моргает и ничего»). Тап по заголовку (data-act) не сюда — там stopPropagation.
  card.addEventListener("click",e=>{
    if(moved) return;                                   // это был свайп/скролл, не тап
    if(!e.target.closest(".stage")) return;             // тап по тексту/кнопкам — не трогаем
    if(card.classList.contains("open")){ card.classList.remove("open"); return; }   // открытое описание — свернуть
    document.body.classList.toggle("clean");            // режим чистого просмотра (держится, пока не тапнешь снова)
  });
  let touchAt=0;   // тач-устройства после touchend шлют синтетический mouseup — иначе clean включался и тут же выключался
  card.addEventListener("touchstart",e=>{ touchAt=Date.now(); start(e.touches[0].clientX,e.touches[0].clientY,e.target); },{passive:true});
  card.addEventListener("touchmove",e=>{ move(e.touches[0].clientX,e.touches[0].clientY);
    if(horiz && !card.classList.contains("open")) e.preventDefault(); },{passive:false});
  card.addEventListener("touchend",e=>{ touchAt=Date.now(); end(); });
  card.addEventListener("mousedown",e=>{ if(Date.now()-touchAt<800) return; start(e.clientX,e.clientY,e.target); });
  window.addEventListener("mousemove",e=>drag&&move(e.clientX,e.clientY));
  window.addEventListener("mouseup",e=>{ if(Date.now()-touchAt<800) return; end(); });
}

function currentList(){
  const catFilter = favMode ? (e=>fav.has(e.id)) : (e=>curCat===null || (e.cat||"")===curCat);
  // реальные даты: показываем только события, у которых есть сегодняшний или будущий сеанс (прошедшие не показываем)
  const base = ALL.filter(e=> catFilter(e) && futureDates(e).length>0 && hasDesc(e));
  // ВСЯ СТАТИКА В КОНЕЦ (owner 2026-07-23): сначала ВСЕ ролики по дате, потом ВСЯ статика по дате.
  // Прежний горизонт в 30 дней убран по прямой просьбе owner-а. Следствие, о котором он в курсе:
  // события ближайшей недели без ролика (≈53 шт, включая сегодняшние) уезжают за видеоблок (~175
  // карточек) — видео концерта через год стоит выше события сегодня без ролика.
  //   ключ [0|1, дата]: 0 = есть видео (весь блок впереди), 1 = статика; внутри каждой группы — по дате.
  const key=e=> [ hasVideo(e)?0:1, String(nearDate(e)) ];
  return base.sort((a,b)=>{ const ka=key(a),kb=key(b);
    for(let i=0;i<ka.length;i++){ if(ka[i]<kb[i])return -1; if(ka[i]>kb[i])return 1; } return 0; });
}

function animateScrollTo(el,target,ms){
  const from=el.scrollLeft, delta=target-from, t0=performance.now();
  if(Math.abs(delta)<1) return;
  function step(now){ const p=Math.min(1,(now-t0)/ms); const e=1-Math.pow(1-p,3);
    el.scrollLeft=from+delta*e; if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}
function updateTabs(){

  tabs.forEach((t,idx)=>{

    // а явно возвращаем скролл к 0 — иначе после возврата с дальней категории лого останется скрытым
    const target = idx<=1 ? 0 : t.offsetLeft-(hdr.clientWidth-t.offsetWidth)/2;

let _io=null; const PAGE=10; let rendered=0;
function bindCard(c){ bindGestures(c); bindActions(c); if(_io) _io.observe(c); }
function appendBatch(){
  const feed=document.getElementById("feed");
  const slice=VIEW.slice(rendered, rendered+PAGE);
  if(!slice.length) return;
  const div=document.createElement("div");
  div.innerHTML=slice.map((e,k)=>cardHTML(e, rendered+k)).join("");
  [...div.children].forEach(c=>{ feed.appendChild(c); bindCard(c); });
  rendered+=slice.length;
}
function ensureRendered(idx){ while(rendered<=idx && rendered<VIEW.length) appendBatch(); }
function buildFeed(list){
  VIEW=list; ACTIVE=-1; rendered=0;
  const feed=document.getElementById("feed");
  feed.innerHTML="";
  if(_io) _io.disconnect();
  _io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting&&en.intersectionRatio>0.6) setActive(+en.target.dataset.i); }); },{threshold:[0,.6,1]});
  if(!VIEW.length){
    feed.innerHTML=`<div class="empty"><span>${tr("emptyFeed")}</span></div>`;
  } else {
    appendBatch();                                   // первые 10 карточек — дальше догружаем по скроллу
  }
  const cards=[...feed.querySelectorAll(".card")];
  document.querySelector(".datebar").style.display = cards.length ? "" : "none";
  if(cards.length){
    let startIdx=0;
    if(lastActiveDate){                                    // ищем в новой категории событие с ближайшей датой к той, на которой были
      const target=new Date(lastActiveDate.replace(" ","T")).getTime();
      let best=Infinity;
      VIEW.forEach((e,idx)=>{ if(!e.date) return; const d=new Date(e.date.replace(" ","T")).getTime();
        const diff=Math.abs(d-target); if(diff<best){ best=diff; startIdx=idx; } });
    }
    ensureRendered(startIdx);
    const target=feed.querySelector(`.card[data-i="${startIdx}"]`);
    if(target) target.scrollIntoView();
    setActive(startIdx);
  }
  buildDateMenu(); updateFavBadges();
}

  const menu=document.getElementById("datemenu");
  const seen=new Map();
  VIEW.forEach((e,i)=>{ const nd=nearDate(e); if(!nd||nd==="9999") return; const k=nd.slice(0,10); if(!seen.has(k)) seen.set(k,i); });
  const t=new Date(); t.setHours(0,0,0,0);
  menu.innerHTML=[...seen.entries()].map(([k,idx])=>{
    const d=new Date(k+"T00:00:00"); const diff=Math.round((d-t)/864e5);
    const yr=d.getFullYear()!==t.getFullYear()?`.${String(d.getFullYear()).slice(2)}`:"";
    const dm=`${d.getDate()}.${String(d.getMonth()+1).padStart(2,"0")}${yr}`;
    // «сегодня»/«завтра» — без даты (короче), остальные — «пн · 13.07» (год — если не текущий)
    const label = diff===0?tr("today"):diff===1?tr("tomorrow"):`${WD[LANG][d.getDay()]} · ${dm}`;
    return `<button class="dmi" data-idx="${idx}">${label}</button>`;
  }).join("");
  menu.querySelectorAll(".dmi").forEach(b=>b.addEventListener("click",()=>{
    menu.classList.remove("open");
    const idx=+b.dataset.idx;
    ensureRendered(idx);                              // догрузить карточки вплоть до выбранной даты
    const card=document.querySelector(`.card[data-i="${idx}"]`);
    if(card){ document.getElementById("feed").scrollTo({top:card.offsetTop}); setActive(idx); }
  }));
}
(function(){
  const chip=document.getElementById("datechip"), menu=document.getElementById("datemenu");
  chip.addEventListener("click",e=>{ e.stopPropagation(); menu.classList.toggle("open"); });
  document.addEventListener("click",e=>{ if(!e.target.closest(".datebar")) menu.classList.remove("open"); });
})();

// догрузка следующих карточек, когда пользователь приближается к концу отрендеренного окна
document.getElementById("feed").addEventListener("scroll",()=>{
  const feed=document.getElementById("feed");
  if(rendered<VIEW.length && feed.scrollTop+feed.clientHeight*2 > feed.scrollHeight) appendBatch();
},{passive:true});

// авто-переход на следующую категорию в конце (не в избранном)
(function(){
  const feed=document.getElementById("feed");
  let sy=0, over=0, atEnd=false;
  feed.addEventListener("touchstart",e=>{ sy=e.touches[0].clientY; over=0;
    atEnd = feed.scrollTop+feed.clientHeight >= feed.scrollHeight-2; },{passive:true});
  feed.addEventListener("touchmove",e=>{ if(atEnd){ const d=sy-e.touches[0].clientY; if(d>0) over=d; } },{passive:true});
  feed.addEventListener("touchend",()=>{ if(atEnd && over>55 && curCat!==null && !favMode){ switchCategory(1); } over=0; });
})();

// ── первый экран (hero) — показываем один раз за сессию: фон-коллаж из наших автофон-клипов (Pexels),
// плейлист встык по 1с, крупная стеклянная плашка с призывом свайпнуть вниз. Свайп/скролл/тап — уходит, открывая ленту.
// Клипы Pexels, забраны к себе на R2 (лицензия Pexels это разрешает): раньше грузились прямо с
// videos.pexels.com — первое, что видит человек, зависело от чужого CDN. {u:клип, t:секунда лучшего кадра}
// Свой домен на бакет вместо служебного pub-*.r2.dev: тот лимитирован по частоте.
// Замер 2026-07-23, 700 запросов в 24 потока: старый адрес — 91 отказ (429), cdn — 0.
const HERO_R2="https://cdn.2see.live/hero/";
const HERO_CLIPS=[
 {u:HERO_R2+"17238582-sd_360_640_30fps.mp4", t:2},  // красная электрогитара
 {u:HERO_R2+"12525478-sd_360_640_24fps.mp4", t:4},  // зал, фиолетовый свет
 {u:HERO_R2+"5657389-sd_338_640_25fps.mp4", t:1.5}, // саксофон
 {u:HERO_R2+"6645567-sd_360_640_24fps.mp4", t:4},   // рояль, руки
 {u:HERO_R2+"15064947_360_640_60fps.mp4", t:6},     // барабанщик на сцене
 {u:HERO_R2+"9419258-sd_338_640_25fps.mp4", t:8},   // вокалистка, тёплый свет
 {u:HERO_R2+"8331699-sd_338_640_25fps.mp4", t:6},   // синтезатор, цветной свет
 {u:HERO_R2+"5124232-sd_360_640_25fps.mp4", t:10}]; // артист в луче на тёмной сцене
// 1с на клип + быстрый .22s фейд читались как мельтешение и мешали читать заголовок. Теперь дольше на клип
// и плавный кроссфейд (см. .hero-bg video в CSS).
const HERO_CLIP_MS=2600, HERO_FADE_MS=900;
let heroTimers=[], heroRunning=false;
function startHeroBG(){
  const box=document.getElementById("heroBg"); if(!box || heroRunning) return; heroRunning=true;
  const mk=()=>{ const v=document.createElement("video"); v.muted=true; v.defaultMuted=true; v.playsInline=true;
    v.setAttribute("muted","");v.setAttribute("playsinline","");v.setAttribute("webkit-playsinline","");v.preload="auto"; return v; };
  const a=mk(), b=mk(); box.appendChild(a); box.appendChild(b);
  const bufs=[a,b]; let idx=0, slot=0, zc=0;
  const prep=(v,clip)=>new Promise(res=>{ v.src=clip.u;
    const d=()=>{ try{v.currentTime=clip.t;}catch(_){} res(); };
    if(v.readyState>=1) d(); else v.addEventListener("loadedmetadata",d,{once:true}); });
  const tick=async()=>{
    if(!heroRunning) return;
    if(idx>=HERO_CLIPS.length) idx=0;
    const cur=bufs[slot], prev=bufs[slot^1];
    await prep(cur, HERO_CLIPS[idx]);
    if(!heroRunning) return;
    cur.play().catch(()=>{});
    // НАСТОЯЩИЙ кроссфейд: входящий кладём СВЕРХУ и проявляем поверх предыдущего, а предыдущий держим
    // непрозрачным под ним. Раньше оба анимировались одновременно (один гас, другой проявлялся) — в
    // середине оба были полупрозрачными и сквозь них пробивался чёрный фон: это и читалось как мельтешение.
    cur.style.zIndex=String(++zc);
    cur.classList.add("hon");
    const nextIdx=(idx+1)%HERO_CLIPS.length;
    heroTimers.push(setTimeout(()=>{
      if(!heroRunning) return;
      prev.classList.remove("hon");        // он уже полностью закрыт входящим — гасим незаметно
      prep(prev, HERO_CLIPS[nextIdx]);     // и только теперь перезаряжаем: смена src на ВИДИМОМ буфере дёргала картинку
    }, HERO_FADE_MS));
    idx++; slot^=1;
    heroTimers.push(setTimeout(tick, HERO_CLIP_MS));
  };
  tick();
}
function stopHeroBG(){ heroRunning=false; heroTimers.forEach(clearTimeout); heroTimers=[];
  const box=document.getElementById("heroBg"); if(box) box.innerHTML=""; }
// заставка уходит целиком вверх (как переход к следующему посту ленты), под ней уже первый ролик со всеми компонентами
function dismissHero(){
  const hero=document.getElementById("hero"); if(!hero || hero.dataset.gone) return; hero.dataset.gone="1";
  sessionStorage.setItem("onboarded","1");
  document.body.classList.remove("hero-active");   // сразу возвращаем рейл/дату/звук — первый пост «приезжает» уже полным
  stopHeroBG();
  hero.style.transition="transform .3s cubic-bezier(.33,0,.2,1)";
  hero.style.transform="translateY(-100%)";
  setTimeout(()=>hero.remove(), 340);
}
(function(){
  const hero=document.getElementById("hero");
  const params=new URLSearchParams(location.search);
  const forcePreview=params.has("intro");   // ?intro=1 — всегда показать заставку, для проверки (обычный F5 НЕ сбрасывает sessionStorage, поэтому нужен обходной способ на время тестирования)
  // пришли по ссылке на конкретный ивент (?e=…) — заставку не показываем, сразу открываем пост
  if((sessionStorage.getItem("onboarded") || params.has("e")) && !forcePreview){ hero.remove(); return; }
  document.body.classList.add("hero-active");
  document.getElementById("heroHand").innerHTML=ICON.scrollHand;
  applyStaticI18N();
  startHeroBG();
  // палец ведёт заставку вертикально 1:1 (как свайп поста в ленте): тянешь вверх — уезжает, отпустил за порогом — доводит и открывает первый ролик
  let x0=0,y0=0,dy=0,dragging=false;
  const H=()=>window.innerHeight||812;
  hero.addEventListener("touchstart",e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; dy=0; dragging=true;
    hero.style.transition="none"; },{passive:true});
  // НЕ passive — сами гасим жест (preventDefault), иначе браузер параллельно тащит/выделяет видео как картинку под пальцем
  hero.addEventListener("touchmove",e=>{ if(!dragging) return; e.preventDefault();
    dy=e.touches[0].clientY-y0;
    // вверх — следуем 1:1 (уезжает целиком, открывая ленту); вниз — пружиним слабо (открывать нечего)
    const t = dy<0 ? dy : dy*0.25;
    hero.style.transform=`translateY(${t}px)`; },{passive:false});
  hero.addEventListener("touchend",e=>{ if(!dragging) return; dragging=false;
    const dx=Math.abs((e.changedTouches[0]||{}).clientX-x0);
    if(-dy>H()*0.14 || dx>70 || dy>110){ dismissHero(); }       // свайп вверх (осн.), вбок или заметно вниз — доводим
    else { hero.style.transition="transform .2s ease"; hero.style.transform=""; } },{passive:true});   // не дотянул — вернулась на место
  hero.addEventListener("wheel",e=>{ if(Math.abs(e.deltaY)>0 || Math.abs(e.deltaX)>0) dismissHero(); },{passive:true});
  hero.addEventListener("click",dismissHero);
})();

// демо-датасет собран один раз и не обновляется живым пайплайном — даты в нём стареют.
// вместо ручной правки дат при каждом показе сдвигаем их на лету: якорь = самая ранняя дата в файле,
// разница между якорем и реальным "сегодня" применяется ко всем датам при каждой загрузке страницы.
// (удалено) shiftDatesToToday — фейковый сдвиг дат под «сегодня» убран: фронт работает на РЕАЛЬНЫХ датах
// пришли по шаренной ссылке ?e=<id> — открыть ленту прямо на этом ивенте (в «Все»), дальше юзер свайпает как обычно
function openSharedEvent(id){
  const idx=VIEW.findIndex(e=>e.id===id);
  if(idx<0) return false;
  ensureRendered(idx);
  const card=document.querySelector(`.card[data-i="${idx}"]`);
  if(card){ document.getElementById("feed").scrollTo({top:card.offsetTop}); setActive(idx); }
  return true;
}
// ── Живые данные из базы Афиши ───────────────────────────────────────────────
// До 2026-07-23 лента читала big_feed.json — снимок базы от 8 июля. Он не обновлялся,
// поэтому отставал: 249 событий прода лента не знала, 23 своих показывала после отмены,
// а замороженные ссылки на картинки протухали (68 битых из 643). Теперь берём прямо из
// API — то же, чем живёт сайт афиши, включая ролики (поле video появилось в API
// 2026-07-23). Файл остаётся запасным вариантом на случай, если API недоступен.
const API = "https://riga-afisha-api.fly.dev/api/events?limit=2000";

function fromApi(e){
  // dates у API — [{date_start, ticket_url}], у ленты — просто список строк.
  const ds = (e.dates || []).map(d => d.date_start).filter(Boolean);
  return {
    id: e.id,
    title: e.title, title_ru: e.title_ru, title_lv: e.title_lv, title_en: e.title_en,
    // body — то, по чему лента решает «есть описание» (hasDesc). Общее поле description у прода
    // часто ПУСТОЕ, а текст лежит только в переводах: так пряталось 112 событий из 913, у которых
    // описание было на всех трёх языках. Берём первое непустое.
    body: e.description || e.description_ru || e.description_en || e.description_lv,
    body_ru: e.description_ru, body_lv: e.description_lv, body_en: e.description_en,
    venue: e.venue_name, venue_ru: e.venue_name_ru, venue_lv: e.venue_name_lv, venue_en: e.venue_name_en,
    cat: e.category_label,          // подписи категорий у API и ленты совпадают дословно
    date: e.date_start,
    dates: ds.length ? ds : (e.date_start ? [e.date_start] : []),
    img: e.image_url,
    price_from: e.price_from,
    is_free: !!e.is_free,
    ticket: e.ticket_url,
    video: e.video || null,
  };
}

async function loadEvents(){
  try{
    const r = await fetch(API, {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const rows = await r.json();
    if(!Array.isArray(rows) || !rows.length) throw new Error("пустой ответ");
    return rows.map(fromApi);
  }catch(err){
    // База недоступна — показываем снимок, а не пустой экран.
    console.warn("API недоступен, беру снимок big_feed.json:", err.message);
    return await (await fetch("big_feed.json",{cache:"no-store"})).json();
  }
}

async function boot(){
  applyStaticI18N();
  ALL=await loadEvents();
  buildTabs();
  buildFeed(currentList());
  const sharedId=new URLSearchParams(location.search).get("e");
  if(sharedId) openSharedEvent(+sharedId);   // лента уже в «Все» — событие точно внутри
  let unlocked=false;
  const unlock=()=>{ if(unlocked)return; unlocked=true;
    const v=document.querySelector(`.card[data-i="${ACTIVE}"] video.main`); if(v){ v.muted=!SOUND; v.play().catch(()=>{}); } };
  ["touchstart","click","scroll"].forEach(ev=>window.addEventListener(ev,unlock,{once:true,passive:true}));
}
// поворот экрана меняет высоту карточки (100dvh) → тот же scrollTop после поворота указывает на ДРУГУЮ карточку →
// IntersectionObserver подхватывает не то видео («перескакивает»). Чиним: после поворота довскролливаем
// обратно к активной карточке (без анимации, без смены видео) — тот же ролик остаётся на экране.
let _reorientT=null, _railT=null, _releaseT=null;
window.addEventListener("resize",()=>{
  // iOS Safari шлёт resize и когда просто прячется/появляется системная панель при скролле между роликами —
  // не только при повороте. Меряя высоту .top СРАЗУ на каждый resize, можно попасть на кадр посреди анимации
  // этой панели и получить чуть другое число → рейл/иконки скачут от ролика к ролику. Ждём, пока resize'ы
  // утихнут, и меряем один раз в спокойном кадре (rAF — после того, как браузер точно закончил layout).
  clearTimeout(_railT);
  _railT=setTimeout(()=>requestAnimationFrame(()=>{ syncRailTop();
    document.querySelectorAll(".card.horiz video.main").forEach(fitHorizThird);   // высота экрана изменилась — треть уехала, пересчитать
    document.querySelectorAll(".stage img.poster:not(.bgp)").forEach(fitPosterThird);
  }),150);
  // Глушим наблюдателя НА ПЕРВОМ ЖЕ resize — до того, как он успеет переключить активную карточку
  // на соседнюю из-за изменившейся высоты. ACTIVE при этом остаётся тем, что был ДО поворота,
  // и ниже мы возвращаем скролл именно к нему.
  REORIENTING=true;
  clearTimeout(_reorientT);
  _reorientT=setTimeout(()=>{
    const card=ACTIVE>=0 && document.querySelector(`.card[data-i="${ACTIVE}"]`);
    if(card) document.getElementById("feed").scrollTo({top:card.offsetTop});
    // Отпускаем наблюдателя чуть позже: сам scrollTo тоже заставляет его сработать, и если снять
    // глушилку сразу, он успеет переключить карточку на промежуточном положении.
    // ⚠️ Именно таймером, НЕ requestAnimationFrame: в скрытой вкладке кадры не рисуются вообще,
    // и через rAF глушилка не снялась бы НИКОГДА — лента навсегда перестала бы менять ролики.
    // Поймал на проверке 2026-07-23.
    clearTimeout(_releaseT);
    _releaseT=setTimeout(()=>{ REORIENTING=false; },200);
  },120);
});
boot();
</script>
