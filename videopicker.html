function saveRatings(){ localStorage.setItem(RATE_KEY, JSON.stringify(ratings)); }
function ratedPids(){                                  // pexels_id, с которым вы уже «разобрались»: есть лайк/дизлайк ИЛИ сохранённый комментарий. Комментарий сохраняется явно по Enter, поэтому прятать по нему теперь безопасно
  const s=new Set();
  for(const k in ratings){ const r=ratings[k];
    if(r && (r.like===true||r.like===false || (typeof r.comment==='string' && r.comment.trim()))){
      const pid=k.slice(k.lastIndexOf('|')+1); if(pid) s.add(pid);
    } }
  return s;
}
function curCat(){ return CATEGORIES[ci]; }
function rkey(cand){ const c=cand||curCand(); return curCat().q+'|'+(c?c.pexels_id:'none'); }
function liveCandidates(cat){                         // показываем только НЕоценённое: если клип уже лайкнут/дизлайкнут ХОТЬ В КАКОЙ категории — прячем его везде (один клип оцениваем один раз)
  const rated = ratedPids();
  return (cat.candidates||[]).filter(c=> !rated.has(String(c.pexels_id)));
}
function curCand(){ return liveCandidates(curCat())[vi]; }

function buildProgress(){
  const el=document.getElementById('progress'); el.innerHTML='';
  const n = liveCandidates(curCat()).length;
  for(let i=0;i<n;i++){
    const seg=document.createElement('div'); seg.className='seg';
    seg.innerHTML='<div class="fill"></div>'; el.appendChild(seg);
  }
}
function updateProgressState(){
  const segs=[...document.querySelectorAll('.progress .seg')];
  segs.forEach((s,idx)=>{
    s.classList.toggle('done', idx<vi);
    if(idx!==vi) s.querySelector('.fill').style.width = idx<vi ? '100%' : '0%';
  });
}
function setFill(pct){
  const segs=[...document.querySelectorAll('.progress .seg')];
  const cur=segs[vi]; if(!cur) return;
  cur.classList.remove('done');
  cur.querySelector('.fill').style.width = Math.max(0,Math.min(100,pct))+'%';
}
vid.addEventListener('timeupdate', ()=>{
  if(!vid.duration) return;
  setFill(vid.currentTime/vid.duration*100);           // на зацикленном видео currentTime сбрасывается в 0 сам — полоска гаснет и растёт заново
});

function render(){
  localStorage.setItem('videopicker_pos', ci);          // запоминаем категорию, чтобы после обновления не начинать с 1/76
  const cat=curCat(); const cand=curCand();
  document.getElementById('cattitle').textContent = 'Склад категорий';
  document.getElementById('catsource').textContent = 'источник примера: '+cat.source;
  document.getElementById('catn').textContent = (ci+1)+'/'+CATEGORIES.length;
  const cands = liveCandidates(cat);
  document.getElementById('candn').textContent = cands.length ? (vi+1)+'/'+cands.length : 'нет вариантов';
  document.getElementById('tagpill').textContent = cat.category;
  buildProgress(); updateProgressState();
  if(cand){
    vid.src = cand.url; vid.muted=!SOUND; vid.play().catch(()=>{});
    document.getElementById('playBtn').innerHTML='&#10074;&#10074;';
  } else {
    vid.removeAttribute('src'); vid.load();
  }
  const r = ratings[rkey(cand)];
  document.getElementById('likeBtn').classList.toggle('on', r && r.like===true);
  document.getElementById('dislikeBtn').classList.toggle('on', r && r.like===false);
  document.getElementById('commentText').value = (r && r.comment) || '';
}

function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1100); }

function goPrevCat(){ if(ci>0){ ci--; vi=0; render(); } else toast('это первая категория'); }
function goNextCat(){ if(ci<CATEGORIES.length-1){ ci++; vi=0; render(); } else toast('это последняя категория'); }
function goPrevCand(){ const n=liveCandidates(curCat()).length; if(n){ vi=(vi-1+n)%n; render(); } }
function goNextCand(){
  const n=liveCandidates(curCat()).length;
  if(vi<n-1){ vi++; render(); }
  else { goNextCat(); }                               // последний вариант категории — едем дальше к следующей категории
}

document.querySelectorAll('.tbtn').forEach(b=>{
  b.addEventListener('click', ()=>{
    const act=b.dataset.act;
    if(act==='prevcat') goPrevCat();
    else if(act==='nextcat') goNextCat();
    else if(act==='prevcand') goPrevCand();
    else if(act==='nextcand') goNextCand();
    else if(act==='play'){ if(vid.paused){ vid.play(); document.getElementById('playBtn').innerHTML='&#10074;&#10074;'; document.getElementById('commentBox').classList.remove('show'); commentCand=null; }
      else { vid.pause(); document.getElementById('playBtn').innerHTML='&#9654;'; document.getElementById('commentBox').classList.add('show'); commentCand=curCand(); } }
  });
});

function setLike(v){
  const cand = curCand(); const k=rkey(cand); const prev=ratings[k]||{};
  ratings[k] = Object.assign({}, prev, {like:v, category:curCat().category, query:curCat().q, candidate:cand});
  saveRatings();
  document.getElementById('likeBtn').classList.toggle('on', v===true);
  document.getElementById('dislikeBtn').classList.toggle('on', v===false);
  toast(v?'Нравится':'Не нравится');
  setTimeout(goNextCand, 350);                                 // оценили — сразу едем к следующему варианту/категории
}
document.getElementById('likeBtn').addEventListener('click', ()=>setLike(true));
document.getElementById('dislikeBtn').addEventListener('click', ()=>setLike(false));
function saveComment(){
  const ta=document.getElementById('commentText');
  const cand=commentCand||curCand();               // держится за ЗАМОРОЖЕННЫЙ клип (тот, что был на паузе)
  const k=rkey(cand); const prev=ratings[k]||{category:curCat().category, query:curCat().q, candidate:cand};
  ratings[k]=Object.assign({}, prev, {comment:ta.value});
  saveRatings();
  // видимая реакция: зелёная кнопка + рамка + тост
  const btn=document.getElementById('commentSave');
  btn.textContent='✓ Сохранено'; btn.classList.add('done'); ta.classList.add('saved');
  toast('Комментарий сохранён за клипом');
  setTimeout(()=>{ btn.textContent='Сохранить комментарий (Enter)'; btn.classList.remove('done'); ta.classList.remove('saved'); }, 1400);
}
document.getElementById('commentSave').addEventListener('click', saveComment);
document.getElementById('commentText').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); saveComment(); }   // Enter — сохранить; Shift+Enter — перенос строки
});

document.getElementById('soundBtn').addEventListener('click', ()=>{
  SOUND=!SOUND; vid.muted=!SOUND; document.getElementById('soundBtn').innerHTML = SOUND ? '&#128266;' : '&#128264;';
});

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const arr = Object.values(ratings);
  const blob = new Blob([JSON.stringify(arr, null, 2)], {type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='video_ratings.json';
  document.body.appendChild(a); a.click(); a.remove();
});

// свайп вверх/вниз — смена категории
let sy=null;
document.getElementById('app').addEventListener('touchstart', e=>{ sy=e.touches[0].clientY; }, {passive:true});
document.getElementById('app').addEventListener('touchend', e=>{
  if(sy===null) return;
  const dy = e.changedTouches[0].clientY - sy; sy=null;
  if(Math.abs(dy)<40) return;
  if(dy<0) goNextCat(); else goPrevCat();
});
// колесо мыши для десктоп-теста
document.getElementById('app').addEventListener('wheel', e=>{
  if(Math.abs(e.deltaY)<30) return;
  if(e.deltaY>0) goNextCat(); else goPrevCat();
});

if(new URLSearchParams(location.search).get('view')==='mobile') document.body.classList.add('mobileview');
// восстановить позицию после обновления + перескочить на первую категорию, где ещё есть НЕоценённые
const WAREHOUSE_VERSION='sonnet-v3-visionclean';               // менять при пересборке склада — тогда позиция сбрасывается на начало
(function resumePosition(){
  let start = 0;
  if(localStorage.getItem('videopicker_whver')===WAREHOUSE_VERSION){   // тот же склад — продолжаем с места; другой — с начала
    start = parseInt(localStorage.getItem('videopicker_pos')||'0',10);
    if(isNaN(start) || start<0 || start>=CATEGORIES.length) start=0;
  }
  localStorage.setItem('videopicker_whver', WAREHOUSE_VERSION);
  ci = start; vi = 0;
  let scanned=0;
  while(liveCandidates(CATEGORIES[ci]).length===0 && scanned<CATEGORIES.length){ ci=(ci+1)%CATEGORIES.length; scanned++; }
})();
render();
